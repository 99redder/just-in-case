name = "just-in-case-askk"
main = "worker.js"
compatibility_date = "2025-01-01"

# Allow `import KNOWLEDGE_BASE from './knowledge.md'` in worker.js so the
# knowledge base can be edited as a plain markdown file.
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

[vars]
# OpenAI-compatible chat completions endpoint. MiniMax exposes one at
# https://api.minimaxi.com/v1 — override here if a different region/host is
# needed. The worker appends "/chat/completions" automatically.
ASKK_BASE_URL = "https://api.minimaxi.com/v1"
ASKK_MODEL    = "MiniMax-Text-01"

# Shared D1 database with the main just-in-case worker. K reads `app_data` for
# grounding and validates `jic_session` tokens against `sessions`.
[[d1_databases]]
binding       = "DB"
database_name = "just-in-case-db"
database_id   = "f75d17ed-9561-4a98-ba7c-5f786f178895"

# Required secret (set with `wrangler secret put ASKK_API_KEY`):
#   ASKK_API_KEY — MiniMax (or other OpenAI-compatible) API key.
