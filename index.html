<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Just In Case</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-2: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding-bottom: 2rem;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--surface-2);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .app-title {
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .app-title span {
      font-size: 1.25rem;
    }

    .main-content {
      max-width: 500px;
      margin: 0 auto;
      padding: 1rem;
    }

    .menu-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 1rem;
      overflow: hidden;
      border: 1px solid var(--surface-2);
    }

    .menu-header {
      padding: 0.85rem 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.2s;
    }

    .menu-header:active {
      background: var(--surface-2);
    }

    .menu-header h3 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .menu-icon {
      font-size: 1.3rem;
    }

    .chevron {
      transition: transform 0.3s ease;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .menu-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
      background: var(--bg);
    }

    .menu-content.expanded {
      max-height: 2000px;
    }

    .menu-item {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    .menu-item-info {
      flex: 1;
    }

    .menu-item-title {
      font-size: 0.92rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .menu-item-subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .menu-item-action {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .menu-item-action .btn {
      padding: 0.35rem 0.7rem;
      font-size: 0.8rem;
    }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.45rem 0.85rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:active {
      opacity: 0.8;
    }

    .btn-secondary {
      background: var(--surface-2);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--surface-2);
      color: var(--text-muted);
    }

    .empty-state {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Passwords section specific */
    .password-group {
      border-bottom: 1px solid var(--surface-2);
      padding: 0.8rem 1rem;
    }

    .password-group:last-child {
      border-bottom: none;
    }

    .password-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0;
    }

    .password-label {
      flex: 1;
      font-size: 0.88rem;
    }

    .password-display {
      font-family: "Courier New", monospace;
      font-size: 0.78rem;
      color: var(--text-muted);
      word-break: break-all;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .password-display.revealed {
      color: var(--text);
    }

    /* Where We Have Money section */
    .account-card {
      background: var(--surface-2);
      border-radius: 10px;
      padding: 0.8rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .account-info {
      flex: 1;
    }

    .account-name {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.15rem;
    }

    .account-balance {
      font-size: 0.95rem;
      color: var(--success);
      font-weight: 700;
    }

    .account-balance.negative {
      color: var(--danger);
    }

    .action-btn {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0.4rem 0.7rem;
      font-size: 0.8rem;
      cursor: pointer;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      color: var(--text);
      padding: 0.75rem 1.25rem;
      border-radius: 50px;
      box-shadow: var(--shadow);
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-10px);
    }

    .toast.success { border-left: 4px solid var(--success); }
    .toast.error { border-left: 4px solid var(--danger); }

    @media (max-width: 380px) {
      .menu-item-action .btn { padding: 0.3rem 0.5rem; font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="app-title">
      <span>🛡️</span>
      Just In Case
    </div>
    <button class="btn btn-secondary" id="edit-btn" style="padding:0.35rem 0.6rem;font-size:0.75rem">⚙️</button>
  </header>

  <main class="main-content" id="app">
    <div class="loading" style="padding:2rem 1rem;text-align:center;color:var(--text-muted)">
      <span class="spinner" style="display:inline-block;width:1rem;height:1rem;border:2px solid var(--surface-2);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin-right:0.5rem"></span>
      Loading...
    </div>
  </main>

  <div class="toast" id="toast">
    <span id="toast-icon">✓</span>
    <span id="toast-message">Copied!</span>
  </div>

  <script>
    // Default data structure (matches editor.html)
    const defaultData = {
      firststeps: [
        { id: 1, title: 'Contact Information', details: 'Key people to call:\n- Spouse: 555-123-4567\n- Jane: 555-987-6543\n- Attorney: 555-246-8101', notes: 'Call first if something happens' },
        { id: 2, title: 'Will & Estate', details: 'Location of documents:\n- Will: Filed with attorney John Smith\n- Trust: Stored in safe deposit box #123\n- Power of Attorney: Same location', notes: 'Provide death certificate copies' },
        { id: 3, title: 'Digital Assets', details: 'What to do with online accounts:\n- Social Media: Facebook memorial, Twitter deleted\n- Email: Forward to Jane for 6 months\n- Cloud Storage: Google Drive shared with Jane', notes: 'Delete unused accounts after 1 year' },
        { id: 4, title: 'Debts & Obligations', details: 'What needs to be paid:\n- Mortgage: 6AL Property - $2,500/mo\n- Credit Cards: Close all, pay off balances\n- Car Loans: 2 vehicles - 95EB and 446BB', notes: 'Contact banks immediately' }
      ],
      insurance: [
        { id: 1, type: 'Health', name: 'Primary Plan', details: 'Plan: Blue Cross Blue Shield\nMember ID: BCBS-12345678\nGroup: BCBS-9876\nPhone: 1-800-XXX-XXXX\nPolicy: Self + Spouse', notes: 'Dental and vision included' },
        { id: 2, type: 'Auto', name: 'State Farm', details: 'Agent: John Smith\nPhone: 555-123-4567\nPolicy: AF-7890123\nCoverage: Full', notes: 'Roadside assistance included' },
        { id: 3, type: 'Rental', name: '6AL Property', details: 'Provider: Nationwide\nPolicy: RL-4567890\nDeductible: $1,000', notes: 'Rental insurance for primary rental property' },
        { id: 4, type: 'Life', name: 'Term Life Insurance', details: 'Provider: Prudential\nPolicy: LT-2345678\nBeneficiaries: Spouse 100%\nCoverage: $500,000', notes: 'Policy number: 2345678' }
      ],
      money: [
        { id: 1, account: 'Chase Checking', type: 'Bank', balance: '$12,450.82', loginUrl: 'https://chase.com', username: 'chris.jane', instructions: 'Use phone number verification' },
        { id: 2, account: 'Capital One Savings', type: 'Bank', balance: '$8,235.19', loginUrl: 'https://capitalone.com', username: 'chris.jane', instructions: 'Security token required' },
        { id: 3, account: 'Vanguard IRA', type: 'Investment', balance: '$45,678.42', loginUrl: 'https://vanguard.com', username: '99redder', instructions: 'Use LastPass for credentials' },
        { id: 4, account: 'Robinhood', type: 'Investment', balance: '$2,145.00', loginUrl: 'https://robinhood.com', username: 'chris@99redder.com', instructions: 'Biometric login enabled' }
      ],
      passwords: [
        { id: 1, service: 'Gmail / Google', username: 'chris@99redder.com', password: 'password123', instructions: '2FA via Authy' },
        { id: 2, service: 'iCloud', username: 'chris@icloud.com', password: 'password123', instructions: 'Use this if phone is lost' },
        { id: 3, service: 'GitHub', username: '99redder', password: 'password123', instructions: 'PAT for automation' },
        { id: 4, service: 'LastPass', username: 'chris@99redder.com', password: 'password123', instructions: 'Emergency access to Spouse' },
        { id: 5, service: 'Netflix', username: 'chris@99redder.com', password: 'password123', instructions: 'Shared account' },
        { id: 6, service: 'Disney+', username: 'chris@99redder.com', password: 'password123', instructions: 'Shared account' }
      ]
    };

    // Load data from Cloudflare Worker or use defaults
    async function loadAppData() {
      try {
        const response = await fetch('/api/data');
        if (!response.ok) throw new Error('Failed to fetch data');
        const data = await response.json();
        return data;
      } catch (error) {
        console.warn('Using default data due to fetch error:', error);
        return defaultData;
      }
    }

    // Helper functions
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function getTypeIcon(type) {
      const icons = { 'Health': '🏥', 'Auto': '🚗', 'Rental': '🏠', 'Life': '🛡️' };
      return icons[type] || '📄';
    }

    function getAccountIcon(type) {
      const icons = { 'Bank': '🏦', 'Investment': '📈' };
      return icons[type] || '💼';
    }

    // Toggle menu function
    function toggleMenu(sectionId) {
      const content = document.getElementById(sectionId + '-content');
      if (content) {
        content.classList.toggle('expanded');
      }
    }

    // Render functions
    async function renderApp() {
      const app = document.getElementById('app');
      
      // Show loading state
      app.innerHTML = `
        <div class="loading" style="padding:2rem 1rem;text-align:center;color:var(--text-muted)">
          <span class="spinner" style="display:inline-block;width:1rem;height:1rem;border:2px solid var(--surface-2);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin-right:0.5rem"></span>
          Loading...
        </div>
      `;

      // Fetch data
      let appData = await loadAppData();

      let html = '';

      // Insurance Section
      html += `
        <div class="menu-card">
          <div class="menu-header" onclick="toggleMenu('insurance')">
            <h3><span class="menu-icon">🛡️</span> Insurance</h3>
            <span class="chevron">▼</span>
          </div>
          <div class="menu-content" id="insurance-content">
            ${appData.insurance.length > 0 ? appData.insurance.map(item => `
              <div class="menu-item">
                <div class="menu-item-info">
                  <div class="menu-item-title">${escapeHtml(item.type)}</div>
                  <div class="menu-item-subtitle">${escapeHtml(item.name)}</div>
                </div>
                <div class="menu-item-action">
                  <button class="btn btn-outline" onclick="copyToClipboard('${escapeHtml(item.details)}')">Details</button>
                </div>
              </div>
            `).join('') : '<div class="empty-state">No insurance policies added yet.</div>'}
          </div>
        </div>
      `;

      // Money Section
      html += `
        <div class="menu-card">
          <div class="menu-header" onclick="toggleMenu('money')">
            <h3><span class="menu-icon">💰</span> Where We Have Money</h3>
            <span class="chevron">▼</span>
          </div>
          <div class="menu-content" id="money-content">
            ${appData.money.length > 0 ? appData.money.map(item => `
              <div class="account-card">
                <div class="account-info">
                  <div class="account-name">${escapeHtml(item.account)}</div>
                  <div class="account-balance">${escapeHtml(item.balance)}</div>
                  <div class="account-balance" style="font-size:0.75rem;color:var(--text-muted)">Username: ${escapeHtml(item.username)}</div>
                </div>
                <button class="action-btn" onclick="window.open('${escapeHtml(item.loginUrl)}')">View</button>
              </div>
            `).join('') : '<div class="empty-state">No accounts added yet.</div>'}
          </div>
        </div>
      `;

      // First Steps Section
      html += `
        <div class="menu-card">
          <div class="menu-header" onclick="toggleMenu('firststeps')">
            <h3><span class="menu-icon">🚀</span> First Steps</h3>
            <span class="chevron">▼</span>
          </div>
          <div class="menu-content" id="firststeps-content">
            ${appData.firststeps.length > 0 ? appData.firststeps.map(item => `
              <div class="menu-item">
                <div class="menu-item-info">
                  <div class="menu-item-title">${escapeHtml(item.title || '')}</div>
                  <div class="menu-item-subtitle">${escapeHtml(item.notes || '')}</div>
                </div>
                <div class="menu-item-action">
                  <button class="btn btn-outline" onclick="copyToClipboard('${escapeHtml(item.details || '')}')">Details</button>
                </div>
              </div>
            `).join('') : '<div class="empty-state">No first steps added yet.</div>'}
          </div>
        </div>
      `;

      // Passwords Section
      html += `
        <div class="menu-card">
          <div class="menu-header" onclick="toggleMenu('passwords')">
            <h3><span class="menu-icon">🔑</span> Passwords</h3>
            <span class="chevron">▼</span>
          </div>
          <div class="menu-content" id="passwords-content">
            ${appData.passwords.length > 0 ? appData.passwords.map(item => `
              <div class="password-group">
                <div class="password-item">
                  <span class="password-label">${escapeHtml(item.service)}</span>
                  <span class="password-display" onclick="togglePassword(this)">${escapeHtml(item.password)}</span>
                  <button class="btn btn-secondary" onclick="copyToClipboard('${escapeHtml(item.password)}')">Copy</button>
                </div>
              </div>
            `).join('') : '<div class="empty-state">No passwords added yet.</div>'}
          </div>
        </div>
      `;

      app.innerHTML = html;
    }

    // Password reveal
    function togglePassword(element) {
      element.classList.toggle('revealed');
      if (element.classList.contains('revealed')) {
        element.textContent = 'password123'; // Demo password
        setTimeout(() => {
          element.classList.remove('revealed');
          element.textContent = '••••••••••••';
        }, 5000); // Auto-hide after 5 seconds
      }
    }

    // Copy to clipboard
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        showToast('Copied to clipboard!', 'success');
      }).catch(() => {
        showToast('Failed to copy', 'error');
      });
    }

    // Toast notification
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const toastIcon = document.getElementById('toast-icon');
      const toastMessage = document.getElementById('toast-message');
      
      toastMessage.textContent = message;
      toast.className = `toast show ${type}`;
      
      if (type === 'success') {
        toastIcon.textContent = '✓';
      } else {
        toastIcon.textContent = '!';
      }
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    // Settings button - go to editor
    document.getElementById('edit-btn').addEventListener('click', () => {
      if (confirm('Open editor to make changes?')) {
        window.location.href = 'editor.html';
      }
    });

    // Initialize
    renderApp();
  </script>
</body>
</html>
