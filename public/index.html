<!DOCTYPE html>
<html lang="en" style="background:#0f172a">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Just In Case</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-2: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding-bottom: 2rem;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--surface-2);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .app-title {
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .app-title span {
      font-size: 1.25rem;
    }

    .main-content {
      max-width: 500px;
      margin: 0 auto;
      padding: 1rem;
    }

    .menu-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 1rem;
      overflow: hidden;
      border: 1px solid var(--surface-2);
    }

    .menu-header {
      padding: 0.85rem 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.2s;
    }

    .menu-header:active {
      background: var(--surface-2);
    }

    .menu-header h3 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .menu-icon {
      font-size: 1.3rem;
    }

    .chevron {
      transition: transform 0.3s ease;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .menu-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
      background: var(--bg);
    }

    .menu-content.expanded {
      max-height: 2000px;
    }

    .menu-item {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    .menu-item-info {
      flex: 1;
    }

    .menu-item-title {
      font-size: 0.92rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .menu-item-subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .menu-item-action {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .menu-item-action .btn {
      padding: 0.35rem 0.7rem;
      font-size: 0.8rem;
    }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.45rem 0.85rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:active {
      opacity: 0.8;
    }

    .btn-secondary {
      background: var(--surface-2);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--surface-2);
      color: var(--text-muted);
    }

    .empty-state {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Checklist specific styles */
    .checklist-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem 0;
    }

    .checklist-item input[type="checkbox"] {
      width: 1.1rem;
      height: 1.1rem;
      margin-top: 0.15rem;
      accent-color: var(--success);
      cursor: pointer;
    }

    .checklist-item.completed .checklist-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .checklist-text {
      font-size: 0.9rem;
      line-height: 1.4;
    }

    /* Passwords section specific */
    .password-group {
      border-bottom: 1px solid var(--surface-2);
      padding: 0.8rem 1rem;
    }

    .password-group:last-child {
      border-bottom: none;
    }

    .password-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0;
    }

    .password-label {
      flex: 1;
      font-size: 0.88rem;
    }

    .password-display {
      font-family: "Courier New", monospace;
      font-size: 0.78rem;
      color: var(--text-muted);
      word-break: break-all;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .password-display.revealed {
      color: var(--text);
    }

    /* Where We Have Money section */
    .account-card {
      background: var(--surface-2);
      border-radius: 10px;
      padding: 0.8rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .account-info {
      flex: 1;
    }

    .account-name {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.15rem;
    }

    .account-balance {
      font-size: 0.95rem;
      color: var(--success);
      font-weight: 700;
    }

    .account-balance.negative {
      color: var(--danger);
    }

    .action-btn {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0.4rem 0.7rem;
      font-size: 0.8rem;
      cursor: pointer;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      color: var(--text);
      padding: 0.75rem 1.25rem;
      border-radius: 50px;
      box-shadow: var(--shadow);
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-10px);
    }

    .toast.success { border-left: 4px solid var(--success); }
    .toast.error { border-left: 4px solid var(--danger); }

    @media (max-width: 380px) {
      .menu-item-action .btn { padding: 0.3rem 0.5rem; font-size: 0.75rem; }
    }

    /* Details modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 1rem;
    }

    @media (min-width: 480px) {
      .modal-overlay { align-items: center; }
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--surface-2);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 480px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.4rem;
      line-height: 1;
      cursor: pointer;
      padding: 0 0.25rem;
    }

    .modal-body {
      padding: 1rem 1.25rem;
      overflow-y: auto;
      flex: 1;
    }

    .modal-body pre {
      margin: 0;
      font-family: inherit;
      font-size: 0.9rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }

    .modal-body pre a {
      color: var(--primary);
      text-decoration: underline;
      word-break: break-all;
    }

    .modal-footer {
      padding: 0.75rem 1.25rem;
      border-top: 1px solid var(--surface-2);
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      flex-shrink: 0;
    }
  </style>
</head>
<body style="display:none">
  <header class="app-header">
    <div class="app-title">
      <span>🛡️</span>
      Just In Case
    </div>
    <button class="btn btn-outline" id="logout-btn" style="padding:0.35rem 0.6rem;font-size:0.75rem">Sign Out</button>
  </header>

  <main class="main-content" id="app">
    <div class="loading" style="padding:2rem 1rem;text-align:center;color:var(--text-muted)">
      <span class="spinner" style="display:inline-block;width:1rem;height:1rem;border:2px solid var(--surface-2);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin-right:0.5rem"></span>
      Loading...
    </div>
  </main>

  <div class="toast" id="toast">
    <span id="toast-icon">✓</span>
    <span id="toast-message">Copied!</span>
  </div>

  <script>
    // Default data structure (matches editor.html)
    const defaultData = {
      firststeps: [
        { id: 1, title: 'Contact Information', details: 'Key people to call:\n- Spouse: 555-123-4567\n- Jane: 555-987-6543\n- Attorney: 555-246-8101', notes: 'Call first if something happens' },
        { id: 2, title: 'Will & Estate', details: 'Location of documents:\n- Will: Filed with attorney John Smith\n- Trust: Stored in safe deposit box #123\n- Power of Attorney: Same location', notes: 'Provide death certificate copies' },
        { id: 3, title: 'Digital Assets', details: 'What to do with online accounts:\n- Social Media: Facebook memorial, Twitter deleted\n- Email: Forward to Jane for 6 months\n- Cloud Storage: Google Drive shared with Jane', notes: 'Delete unused accounts after 1 year' },
        { id: 4, title: 'Debts & Obligations', details: 'What needs to be paid:\n- Mortgage: 6AL Property - $2,500/mo\n- Credit Cards: Close all, pay off balances\n- Car Loans: 2 vehicles - 95EB and 446BB', notes: 'Contact banks immediately' }
      ],
      insurance: [
        { id: 1, type: 'Health', name: 'Primary Plan', details: 'Plan: Blue Cross Blue Shield\nMember ID: BCBS-12345678\nGroup: BCBS-9876\nPhone: 1-800-XXX-XXXX\nPolicy: Self + Spouse', notes: 'Dental and vision included' },
        { id: 2, type: 'Auto', name: 'State Farm', details: 'Agent: John Smith\nPhone: 555-123-4567\nPolicy: AF-7890123\nCoverage: Full', notes: 'Roadside assistance included' },
        { id: 3, type: 'Rental', name: '6AL Property', details: 'Provider: Nationwide\nPolicy: RL-4567890\nDeductible: $1,000', notes: 'Rental insurance for primary rental property' },
        { id: 4, type: 'Life', name: 'Term Life Insurance', details: 'Provider: Prudential\nPolicy: LT-2345678\nBeneficiaries: Spouse 100%\nCoverage: $500,000', notes: 'Policy number: 2345678' }
      ],
      money: [
        { id: 1, account: 'Chase Checking', type: 'Bank', balance: '$12,450.82', loginUrl: 'https://chase.com', username: 'chris.jane', instructions: 'Use phone number verification' },
        { id: 2, account: 'Capital One Savings', type: 'Bank', balance: '$8,235.19', loginUrl: 'https://capitalone.com', username: 'chris.jane', instructions: 'Security token required' },
        { id: 3, account: 'Vanguard IRA', type: 'Investment', balance: '$45,678.42', loginUrl: 'https://vanguard.com', username: '99redder', instructions: 'Use LastPass for credentials' },
        { id: 4, account: 'Robinhood', type: 'Investment', balance: '$2,145.00', loginUrl: 'https://robinhood.com', username: 'chris@99redder.com', instructions: 'Biometric login enabled' }
      ],
      passwords: [
        { id: 1, service: 'Gmail / Google', username: 'chris@99redder.com', password: 'password123', instructions: '2FA via Authy' },
        { id: 2, service: 'iCloud', username: 'chris@icloud.com', password: 'password123', instructions: 'Use this if phone is lost' },
        { id: 3, service: 'GitHub', username: '99redder', password: 'password123', instructions: 'PAT for automation' },
        { id: 4, service: 'LastPass', username: 'chris@99redder.com', password: 'password123', instructions: 'Emergency access to Spouse' },
        { id: 5, service: 'Netflix', username: 'chris@99redder.com', password: 'password123', instructions: 'Shared account' },
        { id: 6, service: 'Disney+', username: 'chris@99redder.com', password: 'password123', instructions: 'Shared account' }
      ],
      checklist: [
        { id: 1, text: 'Review emergency contacts', completed: false },
        { id: 2, text: 'Update will and estate documents', completed: true },
        { id: 3, text: 'Check insurance policies expiration', completed: false },
        { id: 4, text: 'Organize digital asset list', completed: false },
        { id: 5, text: 'File Taxes', completed: false }
      ]
    };

    // Load data from Cloudflare Worker or use defaults
    async function loadAppData() {
      const token = localStorage.getItem('jic_session');
      try {
        const response = await fetch('/api/data', {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
        });
        if (!response.ok) throw new Error('Failed to fetch data');
        const data = await response.json();
        return data;
      } catch (error) {
        console.warn('Using default data due to fetch error:', error);
        return defaultData;
      }
    }

    // Helper functions
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function getTypeIcon(type) {
      const icons = { 'Health': '🏥', 'Auto': '🚗', 'Rental': '🏠', 'Life': '🛡️' };
      return icons[type] || '📄';
    }

    function getAccountIcon(type) {
      const icons = { 'Bank': '🏦', 'Investment': '📈' };
      return icons[type] || '💼';
    }

    // Toggle menu function
    function toggleMenu(sectionId) {
      const content = document.getElementById(sectionId + '-content');
      if (content) {
        content.classList.toggle('expanded');
      }
    }

    // Module-level store — lets onclick handlers look up text by ID instead of
    // embedding it inline (which breaks on single quotes, newlines, etc.)
    let appData = { firststeps: [], insurance: [], money: [], passwords: [], checklist: [] };

    // Render functions
    async function renderApp() {
      const app = document.getElementById('app');

      // Show loading state
      app.innerHTML = `
        <div class="loading" style="padding:2rem 1rem;text-align:center;color:var(--text-muted)">
          <span class="spinner" style="display:inline-block;width:1rem;height:1rem;border:2px solid var(--surface-2);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin-right:0.5rem"></span>
          Loading...
        </div>
      `;

      // Fetch data
      appData = await loadAppData();

      let html = '';

      // First Steps Section (moved to top)
      html += `
        <div class="menu-card">
          <div class="menu-header" onclick="toggleMenu('firststeps')">
            <h3><span class="menu-icon">🚀</span> First Steps</h3>
            <span class="chevron">▼</span>
          </div>
          <div class="menu-content" id="firststeps-content">
            ${appData.firststeps.length > 0 ? appData.firststeps.map(item => `
              <div class="menu-item">
                <div class="menu-item-info">
                  <div class="menu-item-title">${escapeHtml(item.title || '')}</div>
                  <div class="menu-item-subtitle">${escapeHtml(item.notes || '')}</div>
                </div>
                <div class="menu-item-action">
                  <button class="btn btn-outline" onclick="showDetails('firststeps',${item.id})">Details</button>
                </div>
              </div>
            `).join('') : '<div class="empty-state">No first steps added yet.</div>'}
          </div>
        </div>
      `;

      // Insurance Section
      html += `
        <div class="menu-card">
          <div class="menu-header" onclick="toggleMenu('insurance')">
            <h3><span class="menu-icon">🛡️</span> Insurance</h3>
            <span class="chevron">▼</span>
          </div>
          <div class="menu-content" id="insurance-content">
            ${appData.insurance.length > 0 ? appData.insurance.map(item => `
              <div class="menu-item">
                <div class="menu-item-info">
                  <div class="menu-item-title">${escapeHtml(item.type)}</div>
                  <div class="menu-item-subtitle">${escapeHtml(item.name)}</div>
                </div>
                <div class="menu-item-action">
                  <button class="btn btn-outline" onclick="showDetails('insurance',${item.id})">Details</button>
                </div>
              </div>
            `).join('') : '<div class="empty-state">No insurance policies added yet.</div>'}
          </div>
        </div>
      `;

      // Money Section
      html += `
        <div class="menu-card">
          <div class="menu-header" onclick="toggleMenu('money')">
            <h3><span class="menu-icon">💰</span> Where We Have Money</h3>
            <span class="chevron">▼</span>
          </div>
          <div class="menu-content" id="money-content">
            ${appData.money.length > 0 ? appData.money.map(item => `
              <div class="account-card">
                <div class="account-info">
                  <div class="account-name">${escapeHtml(item.account)}</div>
                  <div class="account-balance">${escapeHtml(item.balance)}</div>
                  <div class="account-balance" style="font-size:0.75rem;color:var(--text-muted)">Username: ${escapeHtml(item.username)}</div>
                </div>
                <button class="action-btn" onclick="window.open('${escapeHtml(item.loginUrl)}')">View</button>
              </div>
            `).join('') : '<div class="empty-state">No accounts added yet.</div>'}
          </div>
        </div>
      `;

      // Passwords Section
      html += `
        <div class="menu-card">
          <div class="menu-header" onclick="toggleMenu('passwords')">
            <h3><span class="menu-icon">🔑</span> Passwords</h3>
            <span class="chevron">▼</span>
          </div>
          <div class="menu-content" id="passwords-content">
            ${appData.passwords.length > 0 ? appData.passwords.map(item => `
              <div class="password-group">
                <div class="password-item">
                  <span class="password-label">${escapeHtml(item.service)}</span>
                  <span class="password-display" data-pw="${escapeHtml(item.password)}" onclick="togglePassword(this)">••••••••••</span>
                  <button class="btn btn-secondary" onclick="copyField('passwords',${item.id},'password')">Copy</button>
                </div>
              </div>
            `).join('') : '<div class="empty-state">No passwords added yet.</div>'}
          </div>
        </div>
      `;

      // Checklist Section (moved to bottom)
      html += `
        <div class="menu-card">
          <div class="menu-header" onclick="toggleMenu('checklist')">
            <h3><span class="menu-icon">📋</span> Checklist</h3>
            <span class="chevron">▼</span>
          </div>
          <div class="menu-content" id="checklist-content">
            ${appData.checklist.length > 0 ? appData.checklist.map(item => `
              <div class="menu-item checklist-item ${item.completed ? 'completed' : ''}">
                <input type="checkbox" ${item.completed ? 'checked' : ''} onchange="toggleChecklistItem(${item.id})">
                <span class="checklist-text">${escapeHtml(item.text)}</span>
              </div>
            `).join('') : '<div class="empty-state">No checklist items added yet.</div>'}
          </div>
        </div>
      `;

      app.innerHTML = html;
    }

    // Checklist toggle
    function toggleChecklistItem(id) {
      const item = appData.checklist.find(i => i.id === id);
      if (item) {
        item.completed = !item.completed;
        renderApp();
      }
    }

    // Password reveal — reads actual value from data-pw attribute
    function togglePassword(el) {
      if (el.dataset.on === '1') {
        el.textContent = '••••••••••';
        el.dataset.on = '0';
        el.classList.remove('revealed');
      } else {
        el.textContent = el.dataset.pw;
        el.dataset.on = '1';
        el.classList.add('revealed');
        setTimeout(() => {
          if (el.dataset.on === '1') {
            el.textContent = '••••••••••';
            el.dataset.on = '0';
            el.classList.remove('revealed');
          }
        }, 5000);
      }
    }

    // Convert URLs in text to clickable links (rest of text is HTML-escaped)
    function linkify(text) {
      const urlPattern = /https?:\/\/[^\s)>\]]+/g;
      const parts = [];
      let lastIndex = 0;
      let match;
      while ((match = urlPattern.exec(text)) !== null) {
        parts.push(escapeHtml(text.slice(lastIndex, match.index)));
        const url = match[0];
        parts.push(`<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(url)}</a>`);
        lastIndex = match.index + url.length;
      }
      parts.push(escapeHtml(text.slice(lastIndex)));
      return parts.join('');
    }

    // Show details in a modal
    function showDetails(section, id) {
      const item = appData[section]?.find(i => i.id === id);
      if (!item) return;
      const title = item.title || item.name || item.type || 'Details';
      const details = item.details || '';

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal" role="dialog" aria-modal="true">
          <div class="modal-header">
            <h2>${escapeHtml(title)}</h2>
            <button class="modal-close" aria-label="Close">×</button>
          </div>
          <div class="modal-body">
            <pre>${linkify(details)}</pre>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" id="modal-copy-btn">Copy</button>
            <button class="btn" id="modal-close-btn">Done</button>
          </div>
        </div>
      `;

      function close() { document.body.removeChild(overlay); }
      overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
      overlay.querySelector('.modal-close').addEventListener('click', close);
      overlay.querySelector('#modal-close-btn').addEventListener('click', close);
      overlay.querySelector('#modal-copy-btn').addEventListener('click', () => {
        navigator.clipboard.writeText(details).then(() => showToast('Copied!', 'success')).catch(() => showToast('Failed to copy', 'error'));
      });

      document.body.appendChild(overlay);
    }

    // Copy a field value by looking up the item in the stored appData
    function copyField(section, id, field) {
      const item = appData[section]?.find(i => i.id === id);
      const text = item?.[field] ?? '';
      navigator.clipboard.writeText(text).then(() => {
        showToast('Copied!', 'success');
      }).catch(() => {
        showToast('Failed to copy', 'error');
      });
    }

    // Toast notification
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const toastIcon = document.getElementById('toast-icon');
      const toastMessage = document.getElementById('toast-message');
      
      toastMessage.textContent = message;
      toast.className = `toast show ${type}`;
      
      if (type === 'success') {
        toastIcon.textContent = '✓';
      } else {
        toastIcon.textContent = '!';
      }
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    // Logout
    document.getElementById('logout-btn').addEventListener('click', async () => {
      const token = localStorage.getItem('jic_session');
      try {
        await fetch('/api/auth/logout', {
          method: 'POST',
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
        });
      } catch (e) { /* ignore */ }
      localStorage.removeItem('jic_session');
      window.location.replace('login.html');
    });

    // Auth guard — show page only after session is confirmed
    (async function init() {
      const token = localStorage.getItem('jic_session');
      if (!token) { window.location.replace('login.html'); return; }
      try {
        const r = await fetch('/api/auth/me', {
          headers: { 'Authorization': `Bearer ${token}` },
        });
        if (!r.ok) {
          localStorage.removeItem('jic_session');
          window.location.replace('login.html');
          return;
        }
      } catch (e) { /* network error — allow through */ }
      document.body.style.display = '';
      renderApp();
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => reg.update());
    }
  </script>
</body>
</html>
