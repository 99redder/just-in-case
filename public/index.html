<!DOCTYPE html>
<html lang="en" style="background:#0f172a">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Just In Case</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-2: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding-bottom: 2rem;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--surface-2);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .app-title {
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .app-title span {
      font-size: 1.25rem;
    }

    .main-content {
      max-width: 500px;
      margin: 0 auto;
      padding: 1rem;
    }

    .menu-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 1rem;
      overflow: hidden;
      border: 1px solid var(--surface-2);
    }

    .menu-header {
      padding: 0.85rem 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.2s;
    }

    .menu-header:active {
      background: var(--surface-2);
    }

    .menu-header h3 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .menu-icon {
      font-size: 1.3rem;
    }

    .chevron {
      transition: transform 0.3s ease;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .menu-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
      background: var(--bg);
    }

    .menu-content.expanded {
      max-height: 2000px;
    }

    .menu-item {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    .menu-item-info {
      flex: 1;
    }

    .menu-item-title {
      font-size: 0.92rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .menu-item-subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .menu-item-action {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .menu-item-action .btn {
      padding: 0.35rem 0.7rem;
      font-size: 0.8rem;
    }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.45rem 0.85rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:active {
      opacity: 0.8;
    }

    .btn-secondary {
      background: var(--surface-2);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--surface-2);
      color: var(--text-muted);
    }

    .empty-state {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Checklist specific styles */
    .checklist-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem 0;
    }

    .checklist-item input[type="checkbox"] {
      width: 1.1rem;
      height: 1.1rem;
      margin-top: 0.15rem;
      accent-color: var(--success);
      cursor: pointer;
    }

    .checklist-item.completed .menu-item-title {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    /* Where We Have Money section */
    .account-card {
      background: var(--surface-2);
      border-radius: 10px;
      padding: 0.8rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .account-info {
      flex: 1;
    }

    .account-name {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.15rem;
    }

    .account-balance {
      font-size: 0.95rem;
      color: var(--success);
      font-weight: 700;
    }

    .account-balance.negative {
      color: var(--danger);
    }

    .action-btn {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0.4rem 0.7rem;
      font-size: 0.8rem;
      cursor: pointer;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      color: var(--text);
      padding: 0.75rem 1.25rem;
      border-radius: 50px;
      box-shadow: var(--shadow);
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-10px);
    }

    .toast.success { border-left: 4px solid var(--success); }
    .toast.error { border-left: 4px solid var(--danger); }

    @media (max-width: 380px) {
      .menu-item-action .btn { padding: 0.3rem 0.5rem; font-size: 0.75rem; }
    }

    /* Details modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 1rem;
    }

    @media (min-width: 480px) {
      .modal-overlay { align-items: center; }
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--surface-2);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 480px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.4rem;
      line-height: 1;
      cursor: pointer;
      padding: 0 0.25rem;
    }

    .modal-body {
      padding: 1rem 1.25rem;
      overflow-y: auto;
      flex: 1;
    }

    .modal-body pre {
      margin: 0;
      font-family: inherit;
      font-size: 0.9rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }

    .modal-body pre a {
      color: var(--primary);
      text-decoration: underline;
      word-break: break-all;
    }

    .modal-footer {
      padding: 0.75rem 1.25rem;
      border-top: 1px solid var(--surface-2);
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    /* ===== Ask K Assistant ===== */
    .askk-fab {
      position: fixed;
      bottom: calc(1rem + env(safe-area-inset-bottom, 0px));
      right: 1rem;
      z-index: 300;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: linear-gradient(145deg, var(--primary), var(--primary-hover));
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.45);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .askk-fab:active { transform: scale(0.96); }
    .askk-overlay {
      position: fixed;
      inset: 0;
      z-index: 350;
      background: rgba(0, 0, 0, 0.6);
      display: none;
    }
    .askk-overlay.open { display: block; }
    .askk-drawer {
      position: fixed;
      top: 0;
      right: -420px;
      width: min(420px, 100vw);
      height: 100%;
      z-index: 400;
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      border-left: 1px solid var(--surface-2);
      display: flex;
      flex-direction: column;
      transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .askk-drawer.open { right: 0; }
    .askk-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--surface-2);
      background: rgba(59, 130, 246, 0.06);
      flex-shrink: 0;
    }
    .askk-header-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--primary), var(--primary-hover));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }
    .askk-header-text { flex: 1; min-width: 0; }
    .askk-header-title {
      font-size: 0.98rem;
      font-weight: 700;
      margin: 0;
      color: var(--text);
    }
    .askk-header-subtitle {
      font-size: 0.74rem;
      color: var(--text-muted);
      margin: 0.1rem 0 0;
    }
    .askk-close {
      background: none;
      border: 1px solid var(--surface-2);
      color: var(--text-muted);
      width: 30px;
      height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .askk-close:active { color: var(--text); }
    .askk-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      -webkit-overflow-scrolling: touch;
    }
    .askk-msg {
      max-width: 88%;
      padding: 0.65rem 0.85rem;
      border-radius: 12px;
      font-size: 0.92rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .askk-msg.user {
      align-self: flex-end;
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .askk-msg.assistant {
      align-self: flex-start;
      background: var(--surface-2);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .askk-msg.assistant a { color: #93c5fd; }
    .askk-msg strong { font-weight: 700; }
    .askk-msg.system {
      align-self: center;
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.25);
      color: var(--text-muted);
      font-size: 0.82rem;
      padding: 0.5rem 0.7rem;
    }
    .askk-typing {
      display: inline-flex;
      gap: 0.3rem;
      padding: 0.1rem 0;
      vertical-align: middle;
    }
    .askk-typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: askk-bounce 1.2s infinite;
    }
    .askk-typing span:nth-child(2) { animation-delay: 0.15s; }
    .askk-typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes askk-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }
    .askk-quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      padding: 0.6rem 1rem;
      border-top: 1px solid var(--surface-2);
      background: rgba(0, 0, 0, 0.15);
    }
    .askk-quick-btn {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: var(--text);
      font-size: 0.78rem;
      padding: 0.35rem 0.65rem;
      border-radius: 16px;
      cursor: pointer;
      font-family: inherit;
    }
    .askk-quick-btn:active { background: rgba(59, 130, 246, 0.2); }
    .askk-input-area {
      padding: 0.7rem 0.85rem calc(0.7rem + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid var(--surface-2);
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .askk-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--surface-2);
      border-radius: 8px;
      padding: 0.6rem 0.8rem;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      line-height: 1.4;
    }
    .askk-input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .askk-send {
      background: var(--primary);
      border: none;
      border-radius: 8px;
      width: 44px;
      height: 40px;
      cursor: pointer;
      color: #fff;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .askk-send:active { background: var(--primary-hover); }
    .askk-send:disabled { opacity: 0.5; cursor: not-allowed; }
    @media (max-width: 480px) {
      .askk-drawer { width: 100vw; right: -100vw; }
      .askk-fab { width: 52px; height: 52px; font-size: 1rem; }
    }
  </style>
</head>
<body style="display:none">
  <header class="app-header">
    <div class="app-title">
      <span>🛡️</span>
      Just In Case
    </div>
    <button class="btn btn-outline" id="logout-btn" style="padding:0.35rem 0.6rem;font-size:0.75rem">Sign Out</button>
  </header>

  <main class="main-content" id="app">
    <div class="loading" style="padding:2rem 1rem;text-align:center;color:var(--text-muted)">
      <span class="spinner" style="display:inline-block;width:1rem;height:1rem;border:2px solid var(--surface-2);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin-right:0.5rem"></span>
      Loading...
    </div>
  </main>

  <div class="toast" id="toast">
    <span id="toast-icon">✓</span>
    <span id="toast-message">Copied!</span>
  </div>

  <!-- Ask K Floating Button -->
  <button class="askk-fab" id="askk-fab" aria-label="Ask K">Ask K</button>

  <!-- Ask K Drawer -->
  <div class="askk-overlay" id="askk-overlay"></div>
  <div class="askk-drawer" id="askk-drawer" role="dialog" aria-modal="true" aria-labelledby="askk-title">
    <div class="askk-header">
      <div class="askk-header-icon">K</div>
      <div class="askk-header-text">
        <h2 class="askk-header-title" id="askk-title">Ask K</h2>
        <p class="askk-header-subtitle">Just In Case assistant</p>
      </div>
      <button class="askk-close" id="askk-close" aria-label="Close">×</button>
    </div>
    <div class="askk-messages" id="askk-messages"></div>
    <div class="askk-quick-actions" id="askk-quick-actions">
      <button class="askk-quick-btn askk-playbook-btn" data-playbook="death-chris" data-label="If Chris dies">📋 If Chris dies</button>
      <button class="askk-quick-btn askk-playbook-btn" data-playbook="medical" data-label="Medical emergency">📋 Medical emergency</button>
      <button class="askk-quick-btn">Where do we have money?</button>
      <button class="askk-quick-btn">What do I do first?</button>
      <button class="askk-quick-btn">List the insurance policies</button>
      <button class="askk-quick-btn">What's left on the checklist?</button>
    </div>
    <div class="askk-input-area">
      <textarea class="askk-input" id="askk-input" placeholder="Ask anything…" rows="1"></textarea>
      <button class="askk-send" id="askk-send" aria-label="Send">→</button>
    </div>
  </div>

  <script>
    // Default data structure (matches editor.html)
    const defaultData = {
      firststeps: [
        { id: 1, title: 'Contact Information', details: 'Key people to call:\n- Spouse: 555-123-4567\n- Family: 555-987-6543\n- Attorney: 555-246-8101', notes: 'Call first if something happens' },
        { id: 2, title: 'Will & Estate', details: 'Location of documents:\n- Will: Filed with attorney John Smith\n- Trust: Stored in safe deposit box #123\n- Power of Attorney: Same location', notes: 'Provide death certificate copies' },
        { id: 3, title: 'Digital Assets', details: 'What to do with online accounts:\n- Social Media: Facebook memorial, Twitter deleted\n- Email: Forward to Jane for 6 months\n- Cloud Storage: Google Drive shared with Jane', notes: 'Delete unused accounts after 1 year' },
        { id: 4, title: 'Debts & Obligations', details: 'What needs to be paid:\n- Mortgage: 6AL Property - $2,500/mo\n- Credit Cards: Close all, pay off balances\n- Car Loans: 2 vehicles - 95EB and 446BB', notes: 'Contact banks immediately' }
      ],
      insurance: [
        { id: 1, type: 'Health', name: 'Primary Plan', details: 'Plan: Blue Cross Blue Shield\nMember ID: BCBS-12345678\nGroup: BCBS-9876\nPhone: 1-800-XXX-XXXX\nPolicy: Self + Spouse', notes: 'Dental and vision included' },
        { id: 2, type: 'Auto', name: 'State Farm', details: 'Agent: John Smith\nPhone: 555-123-4567\nPolicy: AF-7890123\nCoverage: Full', notes: 'Roadside assistance included' },
        { id: 3, type: 'Rental', name: '6AL Property', details: 'Provider: Nationwide\nPolicy: RL-4567890\nDeductible: $1,000', notes: 'Rental insurance for primary rental property' },
        { id: 4, type: 'Life', name: 'Term Life Insurance', details: 'Provider: Prudential\nPolicy: LT-2345678\nBeneficiaries: Spouse 100%\nCoverage: $500,000', notes: 'Policy number: 2345678' }
      ],
      money: [
        { id: 1, account: 'Chase Checking', type: 'Bank', balance: '$12,450.82', loginUrl: 'https://chase.com', username: 'chris.jane', instructions: 'Use phone number verification' },
        { id: 2, account: 'Capital One Savings', type: 'Bank', balance: '$8,235.19', loginUrl: 'https://capitalone.com', username: 'chris.jane', instructions: 'Security token required' },
        { id: 3, account: 'Vanguard IRA', type: 'Investment', balance: '$45,678.42', loginUrl: 'https://vanguard.com', username: '99redder', instructions: 'Use LastPass for credentials' },
        { id: 4, account: 'Robinhood', type: 'Investment', balance: '$2,145.00', loginUrl: 'https://robinhood.com', username: 'chris@99redder.com', instructions: 'Biometric login enabled' }
      ],
      checklist: []
    };

    // Load data from Cloudflare Worker or use defaults
    async function loadAppData() {
      const token = localStorage.getItem('jic_session');
      try {
        const response = await fetch('/api/data', {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
        });
        if (!response.ok) throw new Error('Failed to fetch data');
        const data = await response.json();
        return data;
      } catch (error) {
        console.warn('Using default data due to fetch error:', error);
        return defaultData;
      }
    }

    // Helper functions
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function getTypeIcon(type) {
      const icons = { 'Health': '🏥', 'Auto': '🚗', 'Rental': '🏠', 'Life': '🛡️' };
      return icons[type] || '📄';
    }

    function getAccountIcon(type) {
      const icons = { 'Bank': '🏦', 'Investment': '📈' };
      return icons[type] || '💼';
    }

    // Toggle menu function
    function toggleMenu(sectionId) {
      const content = document.getElementById(sectionId + '-content');
      if (content) {
        content.classList.toggle('expanded');
      }
    }

    // Module-level store — lets onclick handlers look up text by ID instead of
    // embedding it inline (which breaks on single quotes, newlines, etc.)
    let appData = { firststeps: [], insurance: [], money: [], checklist: [], generalinfo: [] };
    let kbEntries = [];

    // Ensure data has all required sections (handles API responses with partial data)
    function normalizeData(data) {
      // Normalize money items with defaults
      const normalizeMoneyItem = (item) => ({
        id: item?.id,
        account: item?.account || 'Unknown Account',
        type: item?.type || 'Bank',
        balance: item?.balance || '$0.00',
        loginUrl: item?.loginUrl || '#',
        username: item?.username || '',
        instructions: item?.instructions || ''
      });

      return {
        firststeps: Array.isArray(data?.firststeps) ? data.firststeps : [],
        insurance: Array.isArray(data?.insurance) ? data.insurance : [],
        money: Array.isArray(data?.money) ? data.money.map(normalizeMoneyItem) : [],
        checklist: Array.isArray(data?.checklist) ? data.checklist : [],
        generalinfo: Array.isArray(data?.generalinfo) ? data.generalinfo : []
      };
    }

    function isLikelyContactLine(text) {
      if (!text) return false;
      const s = String(text).trim();
      if (!s) return false;
      const phone = /\b(?:\+?1[\s.-]?)?(?:\(?\d{3}\)?[\s.-]?){2}\d{4}\b/.test(s);
      const email = /\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}\b/i.test(s);
      const url = /https?:\/\/\S+/i.test(s);
      const keyword = /\b(contact|phone|call|email|attorney|agent|advisor|manager|hospital|doctor|bank|insurance|support|hotline)\b/i.test(s);
      return phone || email || (url && keyword) || keyword;
    }

    function extractContactLines(text, source) {
      return String(text || '')
        .split('\n')
        .map(line => line.trim())
        .filter(line => isLikelyContactLine(line))
        .map(line => ({ source, line }));
    }

    function buildContactHubItems() {
      const items = [];
      for (const x of appData.firststeps || []) {
        items.push(...extractContactLines(`${x.title || ''}\n${x.notes || ''}\n${x.details || ''}`, `First Steps: ${x.title || 'Item'}`));
      }
      for (const x of appData.insurance || []) {
        items.push(...extractContactLines(`${x.type || ''} ${x.name || ''}\n${x.notes || ''}\n${x.details || ''}`, `Insurance: ${x.name || x.type || 'Policy'}`));
      }
      for (const x of appData.money || []) {
        items.push(...extractContactLines(`${x.account || ''}\n${x.username || ''}\n${x.instructions || ''}\n${x.loginUrl || ''}`, `Money: ${x.account || 'Account'}`));
      }
      for (const x of appData.generalinfo || []) {
        items.push(...extractContactLines(`${x.name || ''}\n${x.notes || ''}\n${x.details || ''}`, `General Info: ${x.name || 'Item'}`));
      }
      for (const e of kbEntries || []) {
        items.push(...extractContactLines(e.content || '', 'K Knowledge Base'));
      }
      const deduped = [];
      const seen = new Set();
      for (const i of items) {
        const key = i.line.toLowerCase();
        if (seen.has(key)) continue;
        seen.add(key);
        deduped.push(i);
      }
      return deduped;
    }

    async function loadKnowledgeBaseEntries() {
      try {
        const token = localStorage.getItem('jic_session');
        const r = await fetch('/api/knowledge-base', { headers: { 'Authorization': `Bearer ${token}` } });
        if (!r.ok) return [];
        const data = await r.json();
        return Array.isArray(data?.entries) ? data.entries : [];
      } catch {
        return [];
      }
    }

    // Render functions
    async function renderApp() {
      const app = document.getElementById('app');

      // Show loading state
      app.innerHTML = `
        <div class="loading" style="padding:2rem 1rem;text-align:center;color:var(--text-muted)">
          <span class="spinner" style="display:inline-block;width:1rem;height:1rem;border:2px solid var(--surface-2);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin-right:0.5rem"></span>
          Loading...
        </div>
      `;

      // Fetch data
      const loadData = await loadAppData();
      appData = normalizeData(loadData);
      kbEntries = await loadKnowledgeBaseEntries();
      const contactItems = buildContactHubItems();

      let html = '';

      // First Steps Section (moved to top)
      html += `
        <div class="menu-card">
          <div class="menu-header" onclick="toggleMenu('firststeps')">
            <h3><span class="menu-icon">🚀</span> First Steps</h3>
            <span class="chevron">▼</span>
          </div>
          <div class="menu-content" id="firststeps-content">
            ${appData.firststeps.length > 0 ? appData.firststeps.map(item => `
              <div class="menu-item">
                <div class="menu-item-info">
                  <div class="menu-item-title">${escapeHtml(item.title || '')}</div>
                  <div class="menu-item-subtitle">${escapeHtml(item.notes || '')}</div>
                </div>
                <div class="menu-item-action">
                  <button class="btn btn-outline" onclick="showDetails('firststeps',${item.id})">Details</button>
                </div>
              </div>
            `).join('') : '<div class="empty-state">No first steps added yet.</div>'}
          </div>
        </div>
      `;

      // Insurance Section
      html += `
        <div class="menu-card">
          <div class="menu-header" onclick="toggleMenu('insurance')">
            <h3><span class="menu-icon">🛡️</span> Insurance</h3>
            <span class="chevron">▼</span>
          </div>
          <div class="menu-content" id="insurance-content">
            ${appData.insurance.length > 0 ? appData.insurance.map(item => `
              <div class="menu-item">
                <div class="menu-item-info">
                  <div class="menu-item-title">${escapeHtml(item.type)}</div>
                  <div class="menu-item-subtitle">${escapeHtml(item.name)}</div>
                </div>
                <div class="menu-item-action">
                  <button class="btn btn-outline" onclick="showDetails('insurance',${item.id})">Details</button>
                </div>
              </div>
            `).join('') : '<div class="empty-state">No insurance policies added yet.</div>'}
          </div>
        </div>
      `;

      // Money Section
      html += `
        <div class="menu-card">
          <div class="menu-header" onclick="toggleMenu('money')">
            <h3><span class="menu-icon">💰</span> Where We Have Money</h3>
            <span class="chevron">▼</span>
          </div>
          <div class="menu-content" id="money-content">
            ${appData.money.length > 0 ? appData.money.map(item => `
              <div class="menu-item">
                <div class="menu-item-info">
                  <div class="menu-item-title">${escapeHtml(item.account)}</div>
                  <div class="menu-item-subtitle">
                    <strong>Type:</strong> ${escapeHtml(item.type)}<br>
                    <strong>Balance:</strong> ${escapeHtml(item.balance)}<br>
                    <strong>Username:</strong> ${escapeHtml(item.username)}
                    ${item.instructions ? '<br><strong>Instructions:</strong> ' + escapeHtml(item.instructions) : ''}
                  </div>
                </div>
              </div>
            `).join('') : '<div class="empty-state">No accounts added yet.</div>'}
          </div>
        </div>
      `;

      // Contact Link Card
      html += `
        <div class="menu-card">
          <div class="menu-header" onclick="toggleMenu('contactlink')">
            <h3><span class="menu-icon">🔗</span> Contact Link Card</h3>
            <span class="chevron">▼</span>
          </div>
          <div class="menu-content" id="contactlink-content">
            ${contactItems.length > 0 ? contactItems.map(item => `
              <div class="menu-item">
                <div class="menu-item-info">
                  <div class="menu-item-title">${escapeHtml(item.line)}</div>
                  <div class="menu-item-subtitle">${escapeHtml(item.source)}</div>
                </div>
              </div>
            `).join('') : '<div class="empty-state">No contact details found yet. Add contact info in the editor or K knowledge base.</div>'}
          </div>
        </div>
      `;

      // Checklist Section
      html += `
        <div class="menu-card">
          <div class="menu-header" onclick="toggleMenu('checklist')">
            <h3><span class="menu-icon">📋</span> Checklist</h3>
            <span class="chevron">▼</span>
          </div>
          <div class="menu-content" id="checklist-content">
            ${appData.checklist && appData.checklist.length > 0 ? appData.checklist.map(item => `
              <div class="menu-item checklist-item ${item.completed ? 'completed' : ''}" data-id="${item.id}">
                <input type="checkbox" ${item.completed ? 'checked' : ''} onchange="toggleChecklistItem(${item.id})"
                  style="width:1.1rem;height:1.1rem;accent-color:var(--success);cursor:pointer;flex-shrink:0;margin-right:0.5rem">
                <div class="menu-item-info" style="flex:1;min-width:0">
                  <div class="menu-item-title">${escapeHtml(item.title || '')}</div>
                  ${item.notes ? `<div class="menu-item-subtitle">${escapeHtml(item.notes)}</div>` : ''}
                </div>
                ${item.details ? `<div class="menu-item-action"><button class="btn btn-outline" onclick="showDetails('checklist',${item.id})">Details</button></div>` : ''}
              </div>
            `).join('') : '<div class="empty-state">No checklist items added yet.</div>'}
          </div>
        </div>
      `;

      // General Information Section
      html += `
        <div class="menu-card">
          <div class="menu-header" onclick="toggleMenu('generalinfo')">
            <h3><span class="menu-icon">📄</span> General Information</h3>
            <span class="chevron">▼</span>
          </div>
          <div class="menu-content" id="generalinfo-content">
            ${appData.generalinfo.length > 0 ? appData.generalinfo.map(item => `
              <div class="menu-item">
                <div class="menu-item-info">
                  <div class="menu-item-title">${escapeHtml(item.name || '')}</div>
                  ${item.details ? `<div class="menu-item-subtitle">${escapeHtml(item.details)}</div>` : ''}
                </div>
              </div>
            `).join('') : '<div class="empty-state">No general information added yet.</div>'}
          </div>
        </div>`;

      app.innerHTML = html;
    }

    // Checklist toggle — flips completed state and persists to server
    async function toggleChecklistItem(id) {
      const item = appData.checklist?.find(i => i.id === id);
      if (!item) return;
      item.completed = !item.completed;
      // Update visual state without full re-render so expanded sections stay open
      const row = document.querySelector(`.checklist-item[data-id="${id}"]`);
      if (row) {
        row.classList.toggle('completed', item.completed);
      }
      const token = localStorage.getItem('jic_session');
      try {
        await fetch('/api/data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...(token ? { 'Authorization': `Bearer ${token}` } : {}) },
          body: JSON.stringify(appData),
        });
      } catch (e) { /* ignore */ }
    }

    // Convert URLs in text to clickable links (rest of text is HTML-escaped)
    function linkify(text) {
      const urlPattern = /https?:\/\/[^\s)>\]]+/g;
      const parts = [];
      let lastIndex = 0;
      let match;
      while ((match = urlPattern.exec(text)) !== null) {
        parts.push(escapeHtml(text.slice(lastIndex, match.index)));
        const url = match[0];
        parts.push(`<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(url)}</a>`);
        lastIndex = match.index + url.length;
      }
      parts.push(escapeHtml(text.slice(lastIndex)));
      return parts.join('');
    }

    // Show details in a modal
    function showDetails(section, id) {
      const item = appData[section]?.find(i => i.id === id);
      if (!item) return;
      const title = item.title || item.name || item.type || 'Details';
      const details = item.details || '';

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal" role="dialog" aria-modal="true">
          <div class="modal-header">
            <h2>${escapeHtml(title)}</h2>
            <button class="modal-close" aria-label="Close">×</button>
          </div>
          <div class="modal-body">
            <pre>${linkify(details)}</pre>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" id="modal-copy-btn">Copy</button>
            <button class="btn" id="modal-close-btn">Done</button>
          </div>
        </div>
      `;

      function close() { document.body.removeChild(overlay); }
      overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
      overlay.querySelector('.modal-close').addEventListener('click', close);
      overlay.querySelector('#modal-close-btn').addEventListener('click', close);
      overlay.querySelector('#modal-copy-btn').addEventListener('click', () => {
        navigator.clipboard.writeText(details).then(() => showToast('Copied!', 'success')).catch(() => showToast('Failed to copy', 'error'));
      });

      document.body.appendChild(overlay);
    }

    // Copy a field value by looking up the item in the stored appData
    function copyField(section, id, field) {
      const item = appData[section]?.find(i => i.id === id);
      const text = item?.[field] ?? '';
      navigator.clipboard.writeText(text).then(() => {
        showToast('Copied!', 'success');
      }).catch(() => {
        showToast('Failed to copy', 'error');
      });
    }

    // Toast notification
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const toastIcon = document.getElementById('toast-icon');
      const toastMessage = document.getElementById('toast-message');
      
      toastMessage.textContent = message;
      toast.className = `toast show ${type}`;
      
      if (type === 'success') {
        toastIcon.textContent = '✓';
      } else {
        toastIcon.textContent = '!';
      }
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    // Logout
    document.getElementById('logout-btn').addEventListener('click', async () => {
      const token = localStorage.getItem('jic_session');
      try {
        await fetch('/api/auth/logout', {
          method: 'POST',
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
        });
      } catch (e) { /* ignore */ }
      localStorage.removeItem('jic_session');
      window.location.replace('login.html');
    });

    // Auth guard — show page only after session is confirmed
    (async function init() {
      const token = localStorage.getItem('jic_session');
      if (!token) { window.location.replace('login.html'); return; }
      try {
        const r = await fetch('/api/auth/me', {
          headers: { 'Authorization': `Bearer ${token}` },
        });
        if (!r.ok) {
          localStorage.removeItem('jic_session');
          window.location.replace('login.html');
          return;
        }
      } catch (e) { /* network error — allow through */ }
      document.body.style.display = '';
      renderApp();
      initAskK();
    })();

    // ===== Ask K Assistant =====
    const ASKK_API_URL = 'https://just-in-case-askk.99redder.workers.dev/api/ask-k';

    function initAskK() {
      const fab = document.getElementById('askk-fab');
      const overlay = document.getElementById('askk-overlay');
      const drawer = document.getElementById('askk-drawer');
      const closeBtn = document.getElementById('askk-close');
      const messagesEl = document.getElementById('askk-messages');
      const inputEl = document.getElementById('askk-input');
      const sendBtn = document.getElementById('askk-send');
      const quickActions = document.getElementById('askk-quick-actions');
      if (!fab || !drawer) return;

      let history = [];
      let isTyping = false;

      function openDrawer() {
        drawer.classList.add('open');
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
        if (history.length === 0) {
          addMessage('assistant', "Hi — I'm K. Ask me where the money is, who to call, what to pay, or anything else stored in the app.");
        }
        setTimeout(() => inputEl.focus(), 250);
      }
      function closeDrawer() {
        drawer.classList.remove('open');
        overlay.classList.remove('open');
        document.body.style.overflow = '';
      }

      function addMessage(role, content) {
        const msg = document.createElement('div');
        msg.className = `askk-msg ${role}`;
        if (role === 'assistant') {
          msg.innerHTML = formatAssistant(content);
        } else {
          msg.textContent = content;
        }
        messagesEl.appendChild(msg);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        if (role !== 'system') history.push({ role, content });
      }

      // Minimal markdown: bold, bullets, line breaks. Everything else is escaped.
      function formatAssistant(text) {
        const escaped = escapeHtml(text);
        return escaped
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>')
          .replace(/\n/g, '<br>');
      }

      function showTyping() {
        if (document.getElementById('askk-typing-indicator')) return;
        const el = document.createElement('div');
        el.className = 'askk-msg assistant';
        el.id = 'askk-typing-indicator';
        el.innerHTML = '<span style="color:var(--text-muted);font-size:0.85rem;margin-right:0.4rem">K is thinking</span><span class="askk-typing"><span></span><span></span><span></span></span>';
        messagesEl.appendChild(el);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
      function hideTyping() {
        document.getElementById('askk-typing-indicator')?.remove();
      }

      async function sendMessage(text, opts = {}) {
        const playbook = opts.playbook || null;
        const userLabel = playbook ? (opts.label || `Playbook: ${playbook}`) : (text || '').trim();
        if (!userLabel || isTyping) return;
        addMessage('user', userLabel);
        inputEl.value = '';
        inputEl.style.height = 'auto';
        sendBtn.disabled = true;
        isTyping = true;
        showTyping();
        if (quickActions) quickActions.style.display = 'none';

        const token = localStorage.getItem('jic_session');
        try {
          const res = await fetch(ASKK_API_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
            },
            body: JSON.stringify({
              message: playbook ? '' : userLabel,
              playbook,
              history: history.slice(-10),
            }),
          });
          const data = await res.json().catch(() => ({}));
          hideTyping();
          if (res.ok && data.ok && data.reply) {
            addMessage('assistant', data.reply);
          } else if (res.status === 401) {
            addMessage('assistant', 'Your session expired. Please sign in again.');
          } else {
            addMessage('assistant', data.error || "I couldn't reach the assistant. Try again in a moment.");
          }
        } catch (e) {
          hideTyping();
          addMessage('assistant', "I'm having trouble connecting. Check your network and try again.");
        }
        isTyping = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }

      fab.addEventListener('click', openDrawer);
      overlay.addEventListener('click', closeDrawer);
      closeBtn.addEventListener('click', closeDrawer);
      sendBtn.addEventListener('click', () => sendMessage(inputEl.value));
      inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage(inputEl.value);
        }
      });
      inputEl.addEventListener('input', () => {
        inputEl.style.height = 'auto';
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
      });
      quickActions?.addEventListener('click', (e) => {
        const btn = e.target.closest('.askk-quick-btn');
        if (!btn) return;
        const playbook = btn.dataset.playbook;
        if (playbook) {
          sendMessage('', { playbook, label: `▶ ${btn.dataset.label || 'Playbook'}` });
        } else {
          sendMessage(btn.textContent.trim());
        }
      });
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => reg.update());
    }
  </script>
