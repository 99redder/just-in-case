<!DOCTYPE html>
<html lang="en" style="background:#0f172a">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Just In Case - Editor</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-2: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--danger);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .app-title {
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--danger);
    }

    .header-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn {
      background: var(--surface-2);
      color: var(--text);
      border: none;
      border-radius: 8px;
      padding: 0.45rem 0.85rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:active { opacity: 0.8; }
    .btn-primary { background: var(--primary); }
    .btn-danger { background: var(--danger); }
    .btn-outline { border: 1px solid var(--surface-2); background: transparent; }

    .main-content {
      max-width: 600px;
      margin: 0 auto;
      padding: 1rem;
    }

    .section-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 1rem;
      overflow: hidden;
      border: 1px solid var(--surface-2);
    }

    .section-header {
      padding: 0.75rem 1rem;
      background: var(--surface-2);
      border-bottom: 1px solid var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-header h3 {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .section-content {
      padding: 1rem;
    }

    .form-group {
      margin-bottom: 0.9rem;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }

    .form-control {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--surface-2);
      border-radius: 8px;
      padding: 0.65rem 0.85rem;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
    }

    .form-control.multiline {
      min-height: 100px;
      resize: vertical;
    }

    .form-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--surface-2);
    }

    .form-actions .btn-primary { flex: 1; }

    .empty-state {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .data-item {
      background: var(--bg);
      padding: 0.8rem;
      border-radius: 8px;
      margin-bottom: 0.75rem;
      border: 1px solid var(--surface-2);
    }

    .data-item-title {
      font-weight: 600;
      margin-bottom: 0.35rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .data-item-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }

    .data-item-value {
      font-size: 0.92rem;
      word-wrap: break-word;
    }

    .item-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .item-actions .btn {
      padding: 0.3rem 0.6rem;
      font-size: 0.75rem;
    }

    .password-field {
      font-family: "Courier New", monospace;
      font-size: 0.85rem;
    }

    .password-field.revealed {
      color: var(--warning);
    }

    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      color: var(--text);
      padding: 0.75rem 1.25rem;
      border-radius: 50px;
      box-shadow: var(--shadow);
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-10px);
    }

    .toast.success { border-left: 4px solid var(--success); }
    .toast.error { border-left: 4px solid var(--danger); }

    @media (max-width: 480px) {
      .main-content { padding: 0.75rem; }
      .form-actions { flex-direction: column; }
      .form-actions .btn-primary { width: 100%; }
    }
  </style>
</head>
<body style="display:none">
  <header class="app-header">
    <div class="app-title">
      <span>🛡️</span>
      Just In Case <span style="font-size:0.85rem;opacity:0.8">| Editor</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline" id="view-only-btn">View Mode</button>
      <button class="btn btn-primary" id="save-btn">Save Changes</button>
      <button class="btn btn-outline" id="logout-btn">Sign Out</button>
    </div>
  </header>

  <main class="main-content" id="app">
    <div class="loading"><span class="spinner"></span> Loading…</div>
  </main>

  <div class="toast" id="toast">
    <span id="toast-icon">✓</span>
    <span id="toast-message">Saved!</span>
  </div>

  <script>
    // Default data structure
    const defaultData = {
      firststeps: [
        { id: 1, title: 'Contact Information', details: 'Key people to call:\n- Spouse: 555-123-4567\n- Jane: 555-987-6543\n- Attorney: 555-246-8101', notes: 'Call first if something happens' },
        { id: 2, title: 'Will & Estate', details: 'Location of documents:\n- Will: Filed with attorney John Smith\n- Trust: Stored in safe deposit box #123\n- Power of Attorney: Same location', notes: 'Provide death certificate copies' },
        { id: 3, title: 'Digital Assets', details: 'What to do with online accounts:\n- Social Media: Facebook memorial, Twitter deleted\n- Email: Forward to Jane for 6 months\n- Cloud Storage: Google Drive shared with Jane', notes: 'Delete unused accounts after 1 year' },
        { id: 4, title: 'Debts & Obligations', details: 'What needs to be paid:\n- Mortgage: 6AL Property - $2,500/mo\n- Credit Cards: Close all, pay off balances\n- Car Loans: 2 vehicles - 95EB and 446BB', notes: 'Contact banks immediately' }
      ],
      insurance: [
        { id: 1, type: 'Health', name: 'Primary Plan', details: 'Plan: Blue Cross Blue Shield\nMember ID: BCBS-12345678\nGroup: BCBS-9876\nPhone: 1-800-XXX-XXXX\nPolicy: Self + Spouse', notes: 'Dental and vision included' },
        { id: 2, type: 'Auto', name: 'State Farm', details: 'Agent: John Smith\nPhone: 555-123-4567\nPolicy: AF-7890123\nCoverage: Full', notes: 'Roadside assistance included' },
        { id: 3, type: 'Rental', name: '6AL Property', details: 'Provider: Nationwide\nPolicy: RL-4567890\nDeductible: $1,000', notes: 'Rental insurance for primary rental property' },
        { id: 4, type: 'Life', name: 'Term Life Insurance', details: 'Provider: Prudential\nPolicy: LT-2345678\nBeneficiaries: Spouse 100%\nCoverage: $500,000', notes: 'Policy number: 2345678' }
      ],
      money: [
        { id: 1, account: 'Chase Checking', type: 'Bank', balance: '$12,450.82', loginUrl: 'https://chase.com', username: 'chris.jane', instructions: 'Use phone number verification' },
        { id: 2, account: 'Capital One Savings', type: 'Bank', balance: '$8,235.19', loginUrl: 'https://capitalone.com', username: 'chris.jane', instructions: 'Security token required' },
        { id: 3, account: 'Vanguard IRA', type: 'Investment', balance: '$45,678.42', loginUrl: 'https://vanguard.com', username: '99redder', instructions: 'Use LastPass for credentials' },
        { id: 4, account: 'Robinhood', type: 'Investment', balance: '$2,145.00', loginUrl: 'https://robinhood.com', username: 'chris@99redder.com', instructions: 'Biometric login enabled' }
      ],
      passwords: [
        { id: 1, service: 'Gmail / Google', username: 'chris@99redder.com', password: '••••••••••••', instructions: '2FA via Authy' },
        { id: 2, service: 'iCloud', username: 'chris@icloud.com', password: '••••••••••••', instructions: 'Use this if phone is lost' },
        { id: 3, service: 'GitHub', username: '99redder', password: '••••••••••••', instructions: 'PAT for automation' },
        { id: 4, service: 'LastPass', username: 'chris@99redder.com', password: '••••••••••••', instructions: 'Emergency access to Spouse' },
        { id: 5, service: 'Netflix', username: 'chris@99redder.com', password: '••••••••••••', instructions: 'Shared account' },
        { id: 6, service: 'Disney+', username: 'chris@99redder.com', password: '••••••••••••', instructions: 'Shared account' }
      ]
    };

    let appData = JSON.parse(localStorage.getItem('justInCaseData')) || defaultData;
    let isViewMode = false;

    // Storage functions
    async function saveData() {
      const token = localStorage.getItem('jic_session');
      try {
        const response = await fetch('/api/data', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
          },
          body: JSON.stringify(appData)
        });
        
        if (!response.ok) throw new Error('Failed to save data');
        
        showToast('Changes saved successfully!', 'success');
      } catch (error) {
        console.error('Save error:', error);
        showToast('Failed to save changes', 'error');
      }
    }

    async function loadData() {
      const token = localStorage.getItem('jic_session');
      try {
        const response = await fetch('/api/data', {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
        });
        if (!response.ok) throw new Error('Failed to fetch data');
        const data = await response.json();
        return data;
      } catch (error) {
        console.warn('Using default data due to fetch error:', error);
        return defaultData;
      }
    }

    // Render functions
    async function renderApp() {
      const app = document.getElementById('app');
      
      if (isViewMode) {
        app.innerHTML = `
          <div class="loading" style="padding:2rem 1rem">
            <p style="text-align:center;color:var(--text-muted)">
              This is the read-only version of the Just In Case app.<br><br>
              To edit, visit: <strong>editor.html</strong>
            </p>
            <button class="btn btn-primary" style="display:block;margin:1.5rem auto 0" onclick="location.href='editor.html'">
              Go to Editor
            </button>
          </div>
        `;
        return;
      }

      // Fetch data from Cloudflare Worker
      appData = await loadData();

      let html = '';

      // First Steps Section (moved to top)
      html += `
        <div class="section-card">
          <div class="section-header">
            <h3><span>🚀</span> First Steps</h3>
            <button class="btn btn-outline" onclick="addItem('firststeps')">+ Add</button>
          </div>
          <div class="section-content">
            ${appData.firststeps.length > 0 ? appData.firststeps.map(item => `
              <div class="data-item">
                <div class="data-item-title">
                  <span>📝</span>
                  ${escapeHtml(item.title || '')}
                </div>
                <div class="data-item-value" style="white-space:pre-wrap">${escapeHtml(item.details || '')}</div>
                ${item.notes ? `<div class="data-item-label" style="margin-top:0.5rem"><em>${escapeHtml(item.notes)}</em></div>` : ''}
                <div class="item-actions">
                  <button class="btn btn-outline" onclick="copyToClipboard('${escapeHtml(item.details || '')}')">Copy</button>
                  <button class="btn btn-outline" onclick="editItem('firststeps', ${item.id})">Edit</button>
                  <button class="btn btn-danger" onclick="deleteItem('firststeps', ${item.id})">Delete</button>
                </div>
              </div>
            `).join('') : '<div class="empty-state">No first steps added yet.</div>'}
          </div>
        </div>
      `;

      // Insurance Section
      html += `
        <div class="section-card">
          <div class="section-header">
            <h3><span>🛡️</span> Insurance</h3>
            <button class="btn btn-outline" onclick="addItem('insurance')">+ Add</button>
          </div>
          <div class="section-content">
            ${appData.insurance.length > 0 ? appData.insurance.map(item => `
              <div class="data-item">
                <div class="data-item-title">
                  <span>${getTypeIcon(item.type)}</span>
                  ${escapeHtml(item.type)}
                </div>
                <div class="data-item-label">${escapeHtml(item.name)}</div>
                <div class="data-item-value" style="white-space:pre-wrap">${escapeHtml(item.details)}</div>
                ${item.notes ? `<div class="data-item-label" style="margin-top:0.5rem"><em>${escapeHtml(item.notes)}</em></div>` : ''}
                <div class="item-actions">
                  <button class="btn btn-outline" onclick="editItem('insurance', ${item.id})">Edit</button>
                  <button class="btn btn-outline" onclick="copyToClipboard('${escapeHtml(item.details)}')">Copy</button>
                  <button class="btn btn-danger" onclick="deleteItem('insurance', ${item.id})">Delete</button>
                </div>
              </div>
            `).join('') : '<div class="empty-state">No insurance policies added yet.</div>'}
          </div>
        </div>
      `;

      // Money Section
      html += `
        <div class="section-card">
          <div class="section-header">
            <h3><span>💰</span> Where We Have Money</h3>
            <button class="btn btn-outline" onclick="addItem('money')">+ Add</button>
          </div>
          <div class="section-content">
            ${appData.money.length > 0 ? appData.money.map(item => `
              <div class="data-item">
                <div class="data-item-title">
                  <span>${getAccountIcon(item.type)}</span>
                  ${escapeHtml(item.account)}
                </div>
                <div class="data-item-label">${escapeHtml(item.type)} • ${escapeHtml(item.balance)}</div>
                <div class="data-item-label" style="margin-top:0.25rem">Username: ${escapeHtml(item.username)}</div>
                ${item.instructions ? `<div class="data-item-label" style="margin-top:0.25rem"><em>Instructions: ${escapeHtml(item.instructions)}</em></div>` : ''}
                <div class="item-actions">
                  <button class="btn btn-outline" onclick="window.open('${escapeHtml(item.loginUrl)}')">Visit Site</button>
                  <button class="btn btn-outline" onclick="editItem('money', ${item.id})">Edit</button>
                  <button class="btn btn-danger" onclick="deleteItem('money', ${item.id})">Delete</button>
                </div>
              </div>
            `).join('') : '<div class="empty-state">No accounts added yet.</div>'}
          </div>
        </div>
      `;

      // Passwords Section
      html += `
        <div class="section-card">
          <div class="section-header">
            <h3><span>🔑</span> Passwords</h3>
            <button class="btn btn-outline" onclick="addItem('passwords')">+ Add</button>
          </div>
          <div class="section-content">
            ${appData.passwords.length > 0 ? appData.passwords.map(item => `
              <div class="data-item">
                <div class="data-item-title">
                  <span>🔒</span>
                  ${escapeHtml(item.service)}
                </div>
                <div class="data-item-label">Username: ${escapeHtml(item.username)}</div>
                <div class="data-item-label" style="margin-top:0.25rem">
                  Password: <span class="password-field" onclick="togglePassword(this)">${escapeHtml(item.password)}</span>
                  <button class="btn btn-secondary" style="margin-left:0.5rem" onclick="copyPassword(${item.id})">Copy</button>
                </div>
                ${item.instructions ? `<div class="data-item-label" style="margin-top:0.5rem"><em>Instructions: ${escapeHtml(item.instructions)}</em></div>` : ''}
                <div class="item-actions">
                  <button class="btn btn-outline" onclick="editItem('passwords', ${item.id})">Edit</button>
                  <button class="btn btn-danger" onclick="deleteItem('passwords', ${item.id})">Delete</button>
                </div>
              </div>
            `).join('') : '<div class="empty-state">No passwords added yet.</div>'}
          </div>
        </div>
      `;

      app.innerHTML = html;
    }

    // Helper functions
    function getTypeIcon(type) {
      const icons = { 'Health': '🏥', 'Auto': '🚗', 'Rental': '🏠', 'Life': '🛡️' };
      return icons[type] || '📄';
    }

    function getAccountIcon(type) {
      const icons = { 'Bank': '🏦', 'Investment': '📈' };
      return icons[type] || '💼';
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function togglePassword(element) {
      element.classList.toggle('revealed');
      if (element.classList.contains('revealed')) {
        element.textContent = getRevealedPassword();
        setTimeout(() => {
          element.classList.remove('revealed');
          element.textContent = '••••••••••••';
        }, 10000);
      }
    }

    function getRevealedPassword() {
      // In a real app, this would decrypt from storage
      return 'password123'; // Demo
    }

    function copyPassword(id) {
      const item = appData.passwords.find(p => p.id === id);
      if (item) {
        navigator.clipboard.writeText(item.password).then(() => {
          showToast('Password copied!', 'success');
        });
      }
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        showToast('Copied to clipboard!', 'success');
      }).catch(() => {
        showToast('Failed to copy', 'error');
      });
    }

    // Modal for adding/editing items
    function showEditModal(type, item = null) {
      const isEditing = !!item;
      const title = isEditing ? `Edit ${type}` : `Add ${type}`;
      const btnText = isEditing ? 'Update' : 'Save';

      const existingValue = item || { type: 'firststeps', title: '', details: '', notes: '', name: '', username: '', password: '', instructions: '' };

      const html = `
        <div class="modal-overlay" onclick="closeModal(event)">
          <div class="modal">
            <div class="modal-header">
              <h3>${title}</h3>
              <button class="btn-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
              ${type === 'insurance' ? `
                <div class="form-group">
                  <label>Type</label>
                  <select class="form-control" id="edit-type">
                    <option value="Health" ${existingValue.type === 'Health' ? 'selected' : ''}>Health</option>
                    <option value="Auto" ${existingValue.type === 'Auto' ? 'selected' : ''}>Auto</option>
                    <option value="Rental" ${existingValue.type === 'Rental' ? 'selected' : ''}>Rental</option>
                    <option value="Life" ${existingValue.type === 'Life' ? 'selected' : ''}>Life</option>
                  </select>
                </div>
              ` : ''}
              <div class="form-group">
                <label>Name / Account</label>
                <input type="text" class="form-control" id="edit-name" value="${escapeHtml(existingValue.name || '')}" placeholder="e.g., Primary Plan">
              </div>
              <div class="form-group">
                <label>Details / Instructions</label>
                <textarea class="form-control multiline" id="edit-details" placeholder="Enter details here...">${escapeHtml(existingValue.details || '')}</textarea>
              </div>
              ${type === 'passwords' ? `
                <div class="form-group">
                  <label>Service</label>
                  <input type="text" class="form-control" id="edit-service" value="${escapeHtml(existingValue.service || '')}" placeholder="e.g., Gmail">
                </div>
                <div class="form-group">
                  <label>Username</label>
                  <input type="text" class="form-control" id="edit-username" value="${escapeHtml(existingValue.username || '')}" placeholder="e.g., user@email.com">
                </div>
                <div class="form-group">
                  <label>Password</label>
                  <input type="text" class="form-control" id="edit-password" value="${escapeHtml(existingValue.password || '')}" placeholder="••••••••••••">
                </div>
              ` : ''}
              ${type === 'money' ? `
                <div class="form-group">
                  <label>Account Name</label>
                  <input type="text" class="form-control" id="edit-account" value="${escapeHtml(existingValue.account || '')}" placeholder="e.g., Chase Checking">
                </div>
                <div class="form-group">
                  <label>Account Type</label>
                  <select class="form-control" id="edit-account-type">
                    <option value="Bank" ${existingValue.type === 'Bank' ? 'selected' : ''}>Bank</option>
                    <option value="Investment" ${existingValue.type === 'Investment' ? 'selected' : ''}>Investment</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Balance</label>
                  <input type="text" class="form-control" id="edit-balance" value="${escapeHtml(existingValue.balance || '')}" placeholder="e.g., $10,000">
                </div>
                <div class="form-group">
                  <label>Username</label>
                  <input type="text" class="form-control" id="edit-musername" value="${escapeHtml(existingValue.username || '')}" placeholder="Login username">
                </div>
                <div class="form-group">
                  <label>Login URL</label>
                  <input type="text" class="form-control" id="edit-loginurl" value="${escapeHtml(existingValue.loginUrl || '')}" placeholder="https://...">
                </div>
              ` : ''}
              ${type === 'firststeps' ? `
                <div class="form-group">
                  <label>Title</label>
                  <input type="text" class="form-control" id="edit-title" value="${escapeHtml(existingValue.title || '')}" placeholder="e.g., Contact Information">
                </div>
              ` : ''}
              <div class="form-group">
                <label>Notes / Instructions</label>
                <textarea class="form-control multiline" id="edit-notes" placeholder="Any additional information...">${escapeHtml(existingValue.notes || existingValue.instructions || '')}</textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
              <button class="btn btn-primary" onclick="saveItem('${type}', ${isEditing ? item.id : 'null'})">${btnText}</button>
            </div>
          </div>
        </div>
      `;

      document.getElementById('app').innerHTML += html;
    }

    function closeModal(event) {
      if (event && event.target.classList.contains('modal-overlay')) return;
      const overlay = document.querySelector('.modal-overlay');
      if (overlay) overlay.remove();
    }

    function saveItem(type, id) {
      let item;
      if (type === 'firststeps') {
        item = {
          id: id || Date.now(),
          title: document.getElementById('edit-title')?.value || '',
          details: document.getElementById('edit-details')?.value || '',
          notes: document.getElementById('edit-notes')?.value || ''
        };
      } else {
        item = {
          id: id || Date.now(),
          type: document.getElementById('edit-type')?.value || type,
          name: document.getElementById('edit-name')?.value || '',
          details: document.getElementById('edit-details')?.value || '',
          notes: document.getElementById('edit-notes')?.value || '',
          username: document.getElementById('edit-username')?.value || document.getElementById('edit-musername')?.value || '',
          password: document.getElementById('edit-password')?.value || '••••••••••••',
          service: document.getElementById('edit-service')?.value || '',
          account: document.getElementById('edit-account')?.value || '',
          balance: document.getElementById('edit-balance')?.value || '',
          loginUrl: document.getElementById('edit-loginurl')?.value || '',
          instructions: document.getElementById('edit-notes')?.value || ''
        };
      }

      if (type === 'insurance') {
        appData.insurance = id 
          ? appData.insurance.map(i => i.id === id ? item : i)
          : [...appData.insurance, item];
      } else if (type === 'money') {
        appData.money = id 
          ? appData.money.map(i => i.id === id ? item : i)
          : [...appData.money, item];
      } else if (type === 'passwords') {
        appData.passwords = id 
          ? appData.passwords.map(i => i.id === id ? item : i)
          : [...appData.passwords, item];
      } else if (type === 'firststeps') {
        appData.firststeps = id 
          ? appData.firststeps.map(i => i.id === id ? item : i)
          : [...appData.firststeps, item];
      }

      saveData();
      renderApp();
      closeModal();
    }

    function deleteItem(type, id) {
      if (!confirm('Are you sure you want to delete this item?')) return;
      
      if (type === 'insurance') {
        appData.insurance = appData.insurance.filter(i => i.id !== id);
      } else if (type === 'money') {
        appData.money = appData.money.filter(i => i.id !== id);
      } else if (type === 'passwords') {
        appData.passwords = appData.passwords.filter(i => i.id !== id);
      } else if (type === 'firststeps') {
        appData.firststeps = appData.firststeps.filter(i => i.id !== id);
      }

      saveData();
      renderApp();
    }

    function addItem(type) {
      showEditModal(type, null);
    }

    function editItem(type, id) {
      const item = appData[type].find(i => i.id === id);
      showEditModal(type, item);
    }

    // Toast notification
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const toastIcon = document.getElementById('toast-icon');
      const toastMessage = document.getElementById('toast-message');
      
      toastMessage.textContent = message;
      toast.className = `toast show ${type}`;
      
      if (type === 'success') {
        toastIcon.textContent = '✓';
      } else {
        toastIcon.textContent = '!';
      }
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    // View mode toggle
    document.getElementById('view-only-btn').addEventListener('click', () => {
      isViewMode = !isViewMode;
      document.getElementById('view-only-btn').textContent = isViewMode ? 'Edit Mode' : 'View Mode';
      document.getElementById('save-btn').style.display = isViewMode ? 'none' : 'block';
      renderApp();
    });

    document.getElementById('save-btn').addEventListener('click', saveData);

    // Logout
    document.getElementById('logout-btn').addEventListener('click', async () => {
      const token = localStorage.getItem('jic_session');
      try {
        await fetch('/api/auth/logout', {
          method: 'POST',
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
        });
      } catch (e) { /* ignore */ }
      localStorage.removeItem('jic_session');
      window.location.replace('login.html');
    });

    // Auth guard — show page only after session is confirmed
    (async function init() {
      const token = localStorage.getItem('jic_session');
      if (!token) { window.location.replace('login.html'); return; }
      try {
        const r = await fetch('/api/auth/me', {
          headers: { 'Authorization': `Bearer ${token}` },
        });
        if (!r.ok) {
          localStorage.removeItem('jic_session');
          window.location.replace('login.html');
          return;
        }
      } catch (e) { /* network error — allow through */ }
      document.body.style.display = '';
      renderApp();
    })();
  </script>
</body>
</html>
