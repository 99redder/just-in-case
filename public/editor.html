<!DOCTYPE html>
<html lang="en" style="background:#0f172a">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Just In Case — Editor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-2: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    /* ── Header ── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--danger);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .app-title {
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--danger);
    }

    .header-actions { display: flex; gap: 0.5rem; }

    /* ── Buttons ── */
    .btn {
      background: var(--surface-2);
      color: var(--text);
      border: none;
      border-radius: 8px;
      padding: 0.45rem 0.85rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-danger  { background: var(--danger);  color: #fff; }
    .btn-outline { border: 1px solid var(--surface-2); background: transparent; }

    /* ── Layout ── */
    .main-content {
      max-width: 600px;
      margin: 0 auto;
      padding: 1rem;
      padding-bottom: 3rem;
    }

    /* ── Section cards ── */
    .section-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 1rem;
      overflow: hidden;
      border: 1px solid var(--surface-2);
    }

    .section-header {
      padding: 0.75rem 1rem;
      background: var(--surface-2);
      border-bottom: 1px solid var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .section-header:active { opacity: 0.85; }

    .section-header h3 {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex: 1;
    }

    .section-header .collapse-icon {
      font-size: 0.7rem;
      color: var(--text-muted);
      transition: transform 0.2s;
      margin-left: 0.5rem;
    }
    .section-card.collapsed .section-content {
      display: none;
    }
    .section-card.collapsed .collapse-icon {
      transform: rotate(-90deg);
    }

    .section-content { padding: 1rem; }

    .data-item {
      background: var(--bg);
      padding: 0.85rem;
      border-radius: 8px;
      margin-bottom: 0.75rem;
      border: 1px solid var(--surface-2);
    }
    .data-item:last-child { margin-bottom: 0; }

    .data-item-title {
      font-weight: 600;
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .data-item-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.2rem;
    }

    .data-item-detail {
      font-size: 0.88rem;
      white-space: pre-wrap;
      word-wrap: break-word;
      margin-top: 0.35rem;
    }

    .item-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }

    .item-actions .btn {
      padding: 0.3rem 0.65rem;
      font-size: 0.78rem;
    }

    .password-mask {
      font-family: "Courier New", monospace;
      font-size: 0.85rem;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }
    .password-mask.revealed { color: var(--warning); }

    .empty-state {
      padding: 1.5rem 1rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
      padding: 1rem;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--surface-2);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 480px;
      max-height: 88vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--surface-2);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }

    .modal-header h3 { margin: 0; font-size: 1rem; font-weight: 700; }

    .btn-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      line-height: 1;
      border-radius: 4px;
    }
    .btn-close:hover { background: var(--surface-2); color: var(--text); }

    .modal-body { padding: 1.25rem; flex: 1; }

    .modal-footer {
      display: flex;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--surface-2);
      position: sticky;
      bottom: 0;
      background: var(--surface);
    }
    .modal-footer .btn-primary { flex: 1; }

    /* ── Forms ── */
    .form-group { margin-bottom: 1rem; }
    .form-group:last-child { margin-bottom: 0; }

    .form-group label {
      display: block;
      font-size: 0.73rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }

    .form-control {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--surface-2);
      border-radius: 8px;
      padding: 0.65rem 0.85rem;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
    }
    .form-control:focus { outline: none; border-color: var(--primary); }
    textarea.form-control { min-height: 90px; resize: vertical; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      color: var(--text);
      padding: 0.75rem 1.25rem;
      border-radius: 50px;
      box-shadow: var(--shadow);
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
    .toast.success { border-left: 4px solid var(--success); }
    .toast.error   { border-left: 4px solid var(--danger); }

    @media (max-width: 480px) {
      .main-content { padding: 0.75rem; }
      .modal-footer { flex-direction: column; }
    }
  </style>
</head>
<body style="display:none">
  <header class="app-header">
    <div class="app-title">
      <span>🛡️</span>
      Just In Case <span style="font-size:0.85rem;opacity:0.7;margin-left:0.25rem">Editor</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline" id="logout-btn">Sign Out</button>
    </div>
  </header>

  <main class="main-content" id="app">
    <div style="padding:2rem 1rem;text-align:center;color:var(--text-muted)">Loading…</div>
  </main>

  <div class="toast" id="toast">
    <span id="toast-icon">✓</span>
    <span id="toast-msg"></span>
  </div>

  <script>
    let appData = { firststeps: [], insurance: [], money: [], passwords: [], checklist: [] };

    // ── Data I/O ──────────────────────────────────────────────

    function authHeaders() {
      const token = localStorage.getItem('jic_session');
      return token ? { 'Authorization': `Bearer ${token}` } : {};
    }

    async function loadData() {
      const res = await fetch('/api/data', { headers: authHeaders() });
      if (!res.ok) throw new Error('Failed to load');
      return res.json();
    }

    async function saveData() {
      try {
        const res = await fetch('/api/data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders() },
          body: JSON.stringify(appData),
        });
        if (!res.ok) throw new Error('Failed to save');
        showToast('Saved!', 'success');
      } catch (e) {
        showToast('Save failed', 'error');
      }
    }

    // ── Section collapse ──────────────────────────────────────

    function toggleSection(key) {
      const card = document.getElementById('card-' + key);
      if (card) card.classList.toggle('collapsed');
    }

    // ── Render ────────────────────────────────────────────────

    function h(text) {
      if (text == null) return '';
      const d = document.createElement('div');
      d.textContent = String(text);
      return d.innerHTML;
    }

    function renderSection(title, icon, key, renderItem, emptyMsg) {
      return `
        <div class="section-card" id="card-${key}">
          <div class="section-header" onclick="toggleSection('${key}')">
            <h3><span>${icon}</span> ${title} <i class="fas fa-chevron-down collapse-icon" aria-hidden="true"></i></h3>
            <button class="btn btn-outline" onclick="openModal('${key}', null); event.stopPropagation();">+ Add</button>
          </div>
          <div class="section-content">
            ${appData[key].length
              ? appData[key].map(renderItem).join('')
              : `<div class="empty-state">${emptyMsg}</div>`}
          </div>
        </div>`;
    }

    function renderApp() {
      const app = document.getElementById('app');

      const firststepsHtml = renderSection('First Steps', '🚀', 'firststeps', item => `
        <div class="data-item">
          <div class="data-item-title">📝 ${h(item.title)}</div>
          ${item.notes ? `<div class="data-item-meta">${h(item.notes)}</div>` : ''}
          <div class="data-item-detail">${h(item.details)}</div>
          <div class="item-actions">
            <button class="btn btn-outline" onclick="openModal('firststeps',${item.id})">Edit</button>
            <button class="btn btn-danger"  onclick="deleteItem('firststeps',${item.id})">Delete</button>
          </div>
        </div>`, 'No first steps yet.');

      const insuranceHtml = renderSection('Insurance', '🛡️', 'insurance', item => `
        <div class="data-item">
          <div class="data-item-title">${typeIcon(item.type)} ${h(item.type)} — ${h(item.name)}</div>
          ${item.notes ? `<div class="data-item-meta">${h(item.notes)}</div>` : ''}
          <div class="data-item-detail">${h(item.details)}</div>
          <div class="item-actions">
            <button class="btn btn-outline" onclick="openModal('insurance',${item.id})">Edit</button>
            <button class="btn btn-danger"  onclick="deleteItem('insurance',${item.id})">Delete</button>
          </div>
        </div>`, 'No insurance policies yet.');

      const moneyHtml = renderSection('Where We Have Money', '💰', 'money', item => `
        <div class="data-item">
          <div class="data-item-title">${acctIcon(item.type)} ${h(item.account)}</div>
          <div class="data-item-meta">${h(item.type)} • ${h(item.balance)}</div>
          <div class="data-item-meta">Username: ${h(item.username)}</div>
          ${item.instructions ? `<div class="data-item-meta">Instructions: ${h(item.instructions)}</div>` : ''}
          <div class="item-actions">
            <button class="btn btn-outline" onclick="window.open('${h(item.loginUrl)}','_blank')">Visit Site</button>
            <button class="btn btn-outline" onclick="openModal('money',${item.id})">Edit</button>
            <button class="btn btn-danger"  onclick="deleteItem('money',${item.id})">Delete</button>
          </div>
        </div>`, 'No accounts yet.');

      const passwordsHtml = renderSection('Passwords', '🔑', 'passwords', item => `
        <div class="data-item">
          <div class="data-item-title">🔒 ${h(item.service)}</div>
          <div class="data-item-meta">Username: ${h(item.username)}</div>
          <div class="data-item-meta" style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap">
            Password:
            <span class="password-mask" data-pw="${h(item.password)}" onclick="togglePw(this)">••••••••••</span>
            <button class="btn btn-outline" style="padding:0.2rem 0.5rem;font-size:0.75rem" onclick="copyText('${h(item.password)}')">Copy</button>
          </div>
          ${item.instructions ? `<div class="data-item-meta">Instructions: ${h(item.instructions)}</div>` : ''}
          <div class="item-actions">
            <button class="btn btn-outline" onclick="openModal('passwords',${item.id})">Edit</button>
            <button class="btn btn-danger"  onclick="deleteItem('passwords',${item.id})">Delete</button>
          </div>
        </div>`, 'No passwords yet.');

      const checklistHtml = renderSection('Checklist', '📋', 'checklist', item => `
        <div class="data-item">
          <div class="data-item-title" style="${item.completed ? 'text-decoration:line-through;color:var(--text-muted)' : ''}">
            ${item.completed ? '✅' : '⬜'} ${h(item.title)}
          </div>
          ${item.notes ? `<div class="data-item-meta">${h(item.notes)}</div>` : ''}
          ${item.details ? `<div class="data-item-detail">${h(item.details)}</div>` : ''}
          <div class="item-actions">
            <button class="btn btn-outline" onclick="openModal('checklist',${item.id})">Edit</button>
            <button class="btn btn-danger"  onclick="deleteItem('checklist',${item.id})">Delete</button>
          </div>
        </div>`, 'No checklist items yet.');

      app.innerHTML = firststepsHtml + insuranceHtml + moneyHtml + passwordsHtml + checklistHtml;
    }

    // ── Modal ─────────────────────────────────────────────────

    function openModal(section, idOrNull) {
      const item = idOrNull != null ? appData[section].find(i => i.id === idOrNull) : null;
      const isNew = !item;
      const title = isNew ? `Add ${sectionLabel(section)}` : `Edit ${sectionLabel(section)}`;

      const fields = buildFields(section, item);

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

      overlay.innerHTML = `
        <div class="modal">
          <div class="modal-header">
            <h3>${title}</h3>
            <button class="btn-close" onclick="closeModal()">✕</button>
          </div>
          <div class="modal-body">${fields}</div>
          <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveItem('${section}', ${isNew ? 'null' : idOrNull})">${isNew ? 'Add' : 'Save'}</button>
          </div>
        </div>`;

      document.body.appendChild(overlay);
      // Focus first input
      setTimeout(() => overlay.querySelector('input,textarea,select')?.focus(), 50);
    }

    function closeModal() {
      document.querySelector('.modal-overlay')?.remove();
    }

    function buildFields(section, item) {
      const v = (field, fallback = '') => h(item ? (item[field] ?? fallback) : fallback);

      if (section === 'firststeps') return `
        <div class="form-group">
          <label>Title</label>
          <input id="f-title" class="form-control" type="text" value="${v('title')}" placeholder="e.g. Contact Information">
        </div>
        <div class="form-group">
          <label>Details</label>
          <textarea id="f-details" class="form-control">${v('details')}</textarea>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="f-notes" class="form-control" style="min-height:60px">${v('notes')}</textarea>
        </div>`;

      if (section === 'insurance') return `
        <div class="form-group">
          <label>Type</label>
          <select id="f-type" class="form-control">
            ${['Health','Auto','Rental','Life','Other'].map(t =>
              `<option value="${t}" ${(item?.type === t) ? 'selected' : ''}>${t}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>Provider / Plan Name</label>
          <input id="f-name" class="form-control" type="text" value="${v('name')}" placeholder="e.g. Blue Cross Blue Shield">
        </div>
        <div class="form-group">
          <label>Details</label>
          <textarea id="f-details" class="form-control">${v('details')}</textarea>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="f-notes" class="form-control" style="min-height:60px">${v('notes')}</textarea>
        </div>`;

      if (section === 'money') return `
        <div class="form-group">
          <label>Account Name</label>
          <input id="f-account" class="form-control" type="text" value="${v('account')}" placeholder="e.g. Chase Checking">
        </div>
        <div class="form-group">
          <label>Account Type</label>
          <select id="f-type" class="form-control">
            ${['Bank','Investment','Retirement','Crypto','Other'].map(t =>
              `<option value="${t}" ${(item?.type === t) ? 'selected' : ''}>${t}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>Balance</label>
          <input id="f-balance" class="form-control" type="text" value="${v('balance')}" placeholder="e.g. $10,000">
        </div>
        <div class="form-group">
          <label>Username / Login</label>
          <input id="f-username" class="form-control" type="text" value="${v('username')}" placeholder="Login username or email">
        </div>
        <div class="form-group">
          <label>Login URL</label>
          <input id="f-loginUrl" class="form-control" type="url" value="${v('loginUrl')}" placeholder="https://...">
        </div>
        <div class="form-group">
          <label>Instructions</label>
          <textarea id="f-instructions" class="form-control" style="min-height:60px">${v('instructions')}</textarea>
        </div>`;

      if (section === 'passwords') return `
        <div class="form-group">
          <label>Service / Site</label>
          <input id="f-service" class="form-control" type="text" value="${v('service')}" placeholder="e.g. Gmail">
        </div>
        <div class="form-group">
          <label>Username / Email</label>
          <input id="f-username" class="form-control" type="text" value="${v('username')}" placeholder="user@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="f-password" class="form-control" type="text" value="${v('password')}" placeholder="Enter password">
        </div>
        <div class="form-group">
          <label>Instructions / Notes</label>
          <textarea id="f-instructions" class="form-control" style="min-height:60px">${v('instructions')}</textarea>
        </div>`;

      if (section === 'checklist') return `
        <div class="form-group">
          <label>Title</label>
          <input id="f-title" class="form-control" type="text" value="${v('title')}" placeholder="e.g. File Taxes">
        </div>
        <div class="form-group">
          <label>Details</label>
          <textarea id="f-details" class="form-control">${v('details')}</textarea>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="f-notes" class="form-control" style="min-height:60px">${v('notes')}</textarea>
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:0.75rem">
          <input id="f-completed" type="checkbox" ${item?.completed ? 'checked' : ''} style="width:1.1rem;height:1.1rem;accent-color:var(--success);cursor:pointer">
          <label for="f-completed" style="text-transform:none;letter-spacing:0;font-size:0.9rem;font-weight:500;color:var(--text);margin-bottom:0;cursor:pointer">Mark as completed</label>
        </div>`;

      return '';
    }

    function fixDuplicateIds(data) {
      let changed = false;
      for (const section of Object.keys(data)) {
        if (!Array.isArray(data[section])) continue;
        const seen = new Set();
        const maxId = Math.max(0, ...data[section].map(i => Number(i.id) || 0));
        let next = Math.max(Date.now(), maxId + 1);
        for (const item of data[section]) {
          if (!item.id || seen.has(item.id)) {
            item.id = next++;
            changed = true;
          }
          seen.add(item.id);
        }
      }
      return changed;
    }

    function val(id) {
      return document.getElementById(id)?.value?.trim() ?? '';
    }

    function saveItem(section, idArg) {
      const id = (idArg === null || idArg === 'null') ? null : Number(idArg);
      let item;

      if (section === 'firststeps') {
        item = { id: id ?? Date.now(), title: val('f-title'), details: val('f-details'), notes: val('f-notes') };
      } else if (section === 'insurance') {
        item = { id: id ?? Date.now(), type: val('f-type'), name: val('f-name'), details: val('f-details'), notes: val('f-notes') };
      } else if (section === 'money') {
        item = { id: id ?? Date.now(), account: val('f-account'), type: val('f-type'), balance: val('f-balance'), username: val('f-username'), loginUrl: val('f-loginUrl'), instructions: val('f-instructions') };
      } else if (section === 'passwords') {
        item = { id: id ?? Date.now(), service: val('f-service'), username: val('f-username'), password: val('f-password'), instructions: val('f-instructions') };
      } else if (section === 'checklist') {
        item = { id: id ?? Date.now(), title: val('f-title'), details: val('f-details'), notes: val('f-notes'), completed: document.getElementById('f-completed')?.checked ?? false };
      }

      if (id) {
        appData[section] = appData[section].map(i => i.id === id ? item : i);
      } else {
        appData[section] = [...appData[section], item];
      }

      closeModal();
      saveData();
      renderApp();
    }

    function deleteItem(section, id) {
      if (!confirm('Delete this item?')) return;
      appData[section] = appData[section].filter(i => i.id !== id);
      saveData();
      renderApp();
    }

    // ── Helpers ───────────────────────────────────────────────

    function sectionLabel(s) {
      return { firststeps: 'First Step', insurance: 'Insurance Policy', money: 'Account', passwords: 'Password', checklist: 'Checklist Item' }[s] || s;
    }

    function typeIcon(t) {
      return { Health: '🏥', Auto: '🚗', Rental: '🏠', Life: '🛡️' }[t] || '📄';
    }

    function acctIcon(t) {
      return { Bank: '🏦', Investment: '📈', Retirement: '🏛️', Crypto: '🪙' }[t] || '💼';
    }

    function togglePw(el) {
      if (el.dataset.on === '1') {
        el.textContent = '••••••••••';
        el.dataset.on = '0';
        el.classList.remove('revealed');
      } else {
        el.textContent = el.dataset.pw;
        el.dataset.on = '1';
        el.classList.add('revealed');
        setTimeout(() => {
          if (el.dataset.on === '1') {
            el.textContent = '••••••••••';
            el.dataset.on = '0';
            el.classList.remove('revealed');
          }
        }, 10000);
      }
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => showToast('Copied!', 'success'));
    }

    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      document.getElementById('toast-msg').textContent = msg;
      document.getElementById('toast-icon').textContent = type === 'success' ? '✓' : '!';
      toast.className = `toast show ${type}`;
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ── Logout ────────────────────────────────────────────────

    document.getElementById('logout-btn').addEventListener('click', async () => {
      const token = localStorage.getItem('jic_session');
      try {
        await fetch('/api/auth/logout', { method: 'POST', headers: authHeaders() });
      } catch (e) { /* ignore */ }
      localStorage.removeItem('jic_session');
      window.location.replace('login.html');
    });

    // ── Auth guard ────────────────────────────────────────────

    (async function init() {
      const token = localStorage.getItem('jic_session');
      if (!token) { window.location.replace('login.html'); return; }
      try {
        const r = await fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${token}` } });
        if (!r.ok) { localStorage.removeItem('jic_session'); window.location.replace('login.html'); return; }
      } catch (e) { /* network error — allow through */ }

      try {
        appData = await loadData();
        if (fixDuplicateIds(appData)) await saveData();
      } catch (e) { /* use empty defaults */ }

      document.body.style.display = '';
      renderApp();
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => reg.update());
    }
  </script>
</body>
</html>
