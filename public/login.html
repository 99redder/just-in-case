<!DOCTYPE html>
<html lang="en" style="background:#0f172a">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Just In Case — Sign In</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-2: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --danger: #ef4444;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--surface-2);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2rem 1.75rem;
      width: 100%;
      max-width: 380px;
    }

    .card-header {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .card-header .icon { font-size: 2.5rem; line-height: 1; margin-bottom: 0.6rem; }
    .card-header h1 { margin: 0; font-size: 1.4rem; font-weight: 700; }
    .card-header p { margin: 0.35rem 0 0; font-size: 0.85rem; color: var(--text-muted); }

    .form-group { margin-bottom: 1rem; }

    .form-group label {
      display: block;
      font-size: 0.73rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }

    .form-control {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--surface-2);
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    .form-control:focus { outline: none; border-color: var(--primary); }

    .btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 0.25rem;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { opacity: 0.8; }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.85rem;
      color: var(--danger);
      margin-bottom: 1rem;
      display: none;
    }

    .error-box.show { display: block; }

    .forgot-link {
      display: block;
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.83rem;
      color: var(--text-muted);
      text-decoration: none;
    }

    .forgot-link:hover { color: var(--primary); }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="icon">🛡️</div>
      <h1>Just In Case</h1>
      <p>Sign in to access your information</p>
    </div>

    <div class="error-box" id="error-box"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" class="form-control" id="email"
          placeholder="your@email.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" class="form-control" id="password"
          placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn" id="submit-btn">Sign In</button>
    </form>

    <a class="forgot-link" href="reset.html">Forgot your password?</a>
  </div>

  <script>
    // If already authenticated, skip the login page
    (async () => {
      const token = localStorage.getItem('jic_session');
      if (!token) return;
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000);
        const r = await fetch('/api/auth/me', {
          headers: { 'Authorization': `Bearer ${token}` },
          signal: controller.signal
        });
        clearTimeout(timeout);
        if (r.ok) { window.location.replace('index.html'); }
        else { localStorage.removeItem('jic_session'); }
      } catch (e) {
        // network error or timeout — stay on login page, remove stale token
        localStorage.removeItem('jic_session');
      }
    })();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn      = document.getElementById('submit-btn');
      const errBox   = document.getElementById('error-box');
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      errBox.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem('jic_session', data.token);
          window.location.replace('index.html');
        } else {
          errBox.textContent = data.error || 'Sign in failed. Please try again.';
          errBox.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      } catch (err) {
        errBox.textContent = 'Network error. Please check your connection and try again.';
        errBox.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => reg.update());
    }
  </script>
</body>
</html>
